<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordBoost</title>
<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#182420">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#182420;
    --bg-2:#1F2E28;
    --bg-3:#25352E;
    --card:#F3EEd8;
    --card-2:#EAE3C4;
    --ink:#20281F;
    --ink-soft:#4B5A4E;
    --text:#EAE7D6;
    --text-muted:#8FA79B;
    --accent:#D9A441;
    --accent-ink:#3A2A0E;
    --teal:#4E9482;
    --danger:#C1554D;
    --danger-ink:#3a1512;
    --radius:6px;
    --serif:Georgia,'Iowan Old Style','Palatino Linotype',Palatino,serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(217,164,65,0.06), transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(78,148,130,0.08), transparent 45%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:820px;margin:0 auto;padding:20px 16px 96px;}

  /* Header */
  .app-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;padding:4px 2px;}
  .brand{display:flex;flex-direction:column;}
  .brand-title{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:0.5px;color:var(--text);}
  .brand-title span{color:var(--accent);}
  .brand-sub{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-top:2px;}
  .streak-badge{font-family:var(--mono);font-size:13px;background:var(--bg-3);border:1px solid rgba(217,164,65,0.35);color:var(--accent);padding:6px 10px;border-radius:var(--radius);display:flex;align-items:center;gap:6px;white-space:nowrap;}

  /* Tabs */
  .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(31,46,40,0.92);border-top:1px solid rgba(255,255,255,0.08);z-index:40;backdrop-filter:blur(16px);box-shadow:0 -16px 34px rgba(0,0,0,0.24);}
  .bottom-nav-inner{max-width:820px;margin:0 auto;display:flex;gap:6px;padding:7px 10px calc(7px + env(safe-area-inset-bottom));}
  .nav-btn{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
    color:var(--text-muted);font-family:var(--mono);font-size:10.5px;padding:8px 4px;cursor:pointer;border-radius:14px;overflow:hidden;
    transition:color .2s, transform .18s, background .2s;}
  .nav-btn::before{content:"";position:absolute;inset:4px;border-radius:12px;background:linear-gradient(135deg, rgba(217,164,65,0.18), rgba(78,148,130,0.16));opacity:0;transform:scale(.86);transition:opacity .2s, transform .22s cubic-bezier(.16,.84,.28,1);}
  .nav-btn .nav-icon,.nav-btn span{position:relative;z-index:1;}
  .nav-btn .nav-icon{font-size:21px;line-height:1;transition:transform .2s;}
  .nav-btn:hover{color:var(--text);transform:translateY(-1px);}
  .nav-btn.active{color:var(--accent);}
  .nav-btn.active::before{opacity:1;transform:scale(1);}
  .nav-btn.active .nav-icon{transform:translateY(-2px) scale(1.08);}

  h2.section-title{font-family:var(--serif);font-size:20px;font-weight:700;margin:0 0 14px;color:var(--text);}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:4px;display:block;}

  /* Buttons */
  .btn{
    font-family:var(--sans);font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid transparent;
    padding:9px 16px;cursor:pointer;transition:transform .08s ease, filter .15s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-accent{background:var(--accent);color:var(--accent-ink);}
  .btn-accent:hover{filter:brightness(1.08);}
  .btn-teal{background:var(--teal);color:#0d211c;}
  .btn-teal:hover{filter:brightness(1.1);}
  .btn-ghost{background:transparent;color:var(--text);border-color:rgba(255,255,255,0.18);}
  .btn-ghost:hover{border-color:rgba(255,255,255,0.4);}
  .btn-danger{background:transparent;color:var(--danger);border-color:rgba(193,85,77,0.5);}
  .btn-danger:hover{background:rgba(193,85,77,0.12);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-block{width:100%;}
  .btn[disabled]{opacity:0.4;cursor:not-allowed;}

  /* Cards / panels */
  .panel{background:var(--bg-2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
  .reveal{
    opacity:0;
    transform:translateY(18px) scale(0.985);
    filter:saturate(0.92);
    transition:opacity .58s ease, transform .58s cubic-bezier(.16,.84,.28,1), filter .58s ease;
    transition-delay:var(--d,0ms);
    will-change:opacity,transform;
  }
  .reveal.in{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:saturate(1);
  }
  .soft-glow{position:relative;overflow:hidden;}
  .soft-glow::before{
    content:"";
    position:absolute;
    inset:-1px;
    background:linear-gradient(120deg, transparent 18%, rgba(255,255,255,0.12) 45%, transparent 68%);
    transform:translateX(-120%);
    transition:transform .8s ease;
    pointer-events:none;
  }
  .soft-glow:hover::before{transform:translateX(120%);}

  /* Group tabs (folder tabs) */
  .group-row{display:flex;gap:8px;margin-bottom:18px;align-items:center;}
  .group-picker-btn{
    flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.12);color:var(--text);
    padding:12px 16px;border-radius:12px;font-size:14.5px;font-weight:600;font-family:var(--sans);
    cursor:pointer;text-align:left;
  }
  .group-picker-btn .count{color:var(--text-muted);font-family:var(--mono);font-size:12px;font-weight:400;margin-left:4px;}
  .group-picker-btn .chev{color:var(--text-muted);font-size:12px;flex-shrink:0;}
  .group-chip{
    flex-shrink:0;font-family:var(--mono);font-size:12.5px;padding:9px 15px;border-radius:999px;
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);white-space:nowrap;
    cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,border-color .15s,color .15s;
  }
  .group-chip.add{border-style:dashed;color:var(--accent);background:transparent;}

  .gp-list{max-height:52vh;overflow-y:auto;margin:0 -4px;}
  .gp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 4px;
    border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;}
  .gp-row.active{background:rgba(217,164,65,0.1);}
  .gp-info{display:flex;align-items:center;gap:8px;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gp-count{color:var(--text-muted);font-family:var(--mono);font-size:11.5px;flex-shrink:0;}
  .gp-actions{display:flex;gap:2px;flex-shrink:0;}

  .fab{
    position:fixed;right:20px;bottom:86px;z-index:41;width:56px;height:56px;border-radius:50%;
    background:var(--accent);color:var(--accent-ink);border:none;font-size:26px;font-weight:400;line-height:1;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,0,0,0.45);cursor:pointer;
    transition:transform .15s;
  }
  .fab:active{transform:scale(0.94);}
  .fab-backdrop{position:fixed;inset:0;z-index:39;}
  .fab-menu{position:fixed;right:20px;bottom:152px;z-index:41;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
  .fab-menu-item{
    display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid rgba(255,255,255,0.14);
    color:var(--text);padding:11px 18px;border-radius:999px;font-size:13.5px;font-family:var(--sans);font-weight:600;
    cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.35);white-space:nowrap;
  }

  /* Library list */
  .word-list{border-top:1px solid rgba(255,255,255,0.08);}
  .word-row{
    display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .word-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;object-position:center;background:var(--bg-3);flex-shrink:0;}
  .word-thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(135deg, rgba(217,164,65,0.18), rgba(78,148,130,0.2)), var(--bg-3);}
  .word-main{flex:1;min-width:0;}
  .word-term{font-family:var(--serif);font-size:17px;line-height:1.25;color:var(--text);}
  .word-term .sep{color:var(--text-muted);margin:0 6px;font-family:var(--sans);}
  .word-translation{color:var(--accent);font-weight:600;}
  .word-example{
    font-size:14px;color:var(--text-muted);margin-top:4px;font-style:italic;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .word-box{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);white-space:nowrap;}
  .word-actions{display:flex;gap:4px;}
  .icon-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px;}
  .icon-btn:hover{color:var(--text);background:rgba(255,255,255,0.08);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
  .empty-state .big-emoji{font-size:38px;margin-bottom:10px;}
  .empty-state p{font-family:var(--serif);font-size:15px;max-width:340px;margin:0 auto 16px;}

  /* Forms */
  label.field-label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:5px;margin-top:12px;}
  input[type=text],input[type=search],textarea,select{
    width:100%;background:var(--bg-3);border:1px solid rgba(255,255,255,0.12);border-radius:4px;
    color:var(--text);font-family:var(--sans);font-size:16px;padding:10px 10px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:70px;font-family:var(--mono);font-size:12.5px;}
  .form-row{display:flex;gap:10px;}
  .form-row > *{flex:1;}
  .emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .emoji-opt{font-size:18px;background:var(--bg-3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:5px 8px;cursor:pointer;}
  .emoji-opt.sel{border-color:var(--accent);background:rgba(217,164,65,0.15);}
  .voice-row{display:flex;gap:8px;align-items:center;}
  .voice-row input{flex:1;}
  .voice-btn{
    flex:0 0 auto;min-width:44px;height:44px;border-radius:50%;border:1px solid rgba(217,164,65,0.45);
    background:rgba(217,164,65,0.12);color:var(--accent);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:transform .15s, background .15s, box-shadow .15s;
  }
  .voice-btn:hover{background:rgba(217,164,65,0.2);box-shadow:0 0 16px rgba(217,164,65,0.18);}
  .voice-btn.listening{background:var(--accent);color:var(--accent-ink);animation:micPulse 1s ease-in-out infinite;}
  .auto-fill-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}
  .auto-fill-status{font-size:12px;color:var(--text-muted);font-family:var(--mono);}
  @keyframes micPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);box-shadow:0 0 0 7px rgba(217,164,65,0.14);}}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,15,12,0.72);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50;}
  .modal{background:var(--bg-2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:22px;width:100%;max-width:480px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .modal-title{font-family:var(--serif);font-size:19px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  .hint{font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.5;}

  /* Practice picker */
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.mode-grid{grid-template-columns:1fr;}}
  .direction-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .dir-btn{flex:1;padding:11px 8px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.12);
    background:var(--bg-2);color:var(--text-muted);font-family:var(--mono);font-size:12px;cursor:pointer;text-align:center;}
  .dir-btn.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700;}
  .combo-label{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;
    letter-spacing:1px;margin-bottom:8px;text-align:center;width:100%;}
  .mode-card{
    position:relative;overflow:hidden;
    background:
      linear-gradient(145deg, rgba(255,255,255,0.035), transparent 42%),
      var(--bg-2);
    border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:16px;cursor:pointer;
    transition:border-color .2s, transform .2s cubic-bezier(.16,.84,.28,1), box-shadow .2s, background .2s;
  }
  .mode-card:hover{border-color:rgba(217,164,65,0.75);transform:translateY(-4px);box-shadow:0 16px 30px rgba(0,0,0,0.24), 0 0 0 1px rgba(217,164,65,0.08) inset;}
  .mode-card::after{
    content:"";
    position:absolute;
    right:-30px;
    top:-42px;
    width:96px;
    height:96px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(217,164,65,0.18), transparent 66%);
    opacity:0;
    transform:scale(.7);
    transition:opacity .2s, transform .2s;
    pointer-events:none;
  }
  .mode-card:hover::after{opacity:1;transform:scale(1);}
  .mode-card .m-emoji{font-size:22px;display:inline-block;transition:transform .2s;}
  .mode-card:hover .m-emoji{transform:translateY(-2px) rotate(-4deg) scale(1.08);}
  .mode-card .m-title{font-family:var(--serif);font-size:16px;font-weight:700;margin:8px 0 3px;}
  .mode-card .m-desc{font-size:12.5px;color:var(--text-muted);line-height:1.45;}
  .mode-card[disabled]{opacity:0.4;pointer-events:none;}

  /* Flashcard */
  .session-wrap{display:flex;flex-direction:column;align-items:center;}
  .session-top{width:100%;display:grid;grid-template-columns:auto minmax(90px,1fr) auto;gap:12px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:16px;}
  .session-exit{
    border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.06);color:var(--text);
    border-radius:999px;padding:9px 13px;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:700;
    display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s,border-color .15s,transform .12s;
  }
  .session-exit:hover{background:rgba(193,85,77,0.16);border-color:rgba(193,85,77,0.55);color:#F0A79F;}
  .session-exit:active{transform:scale(.97);}
  .progress-track{height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f0c66b,var(--teal));transition:width .35s ease;box-shadow:0 0 16px rgba(217,164,65,0.45);}

  .card-stack{position:relative;width:100%;max-width:400px;margin:0 auto 18px;min-height:460px;}
  .ghost-card{position:absolute;left:0;right:0;top:0;height:100%;background:var(--card-2);border-radius:14px;}
  .ghost-card.g1{transform:scale(0.96) translateY(10px);opacity:0.65;z-index:1;}
  .ghost-card.g2{transform:scale(0.92) translateY(20px);opacity:0.35;z-index:0;}
  .flashcard{
    position:relative;z-index:2;width:100%;min-height:460px;background:var(--card);color:var(--ink);
    border-radius:14px;border-left:6px solid var(--accent);
    box-shadow:0 14px 34px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.05);
    padding:28px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    touch-action:pan-y;cursor:grab;user-select:none;transition:transform .35s cubic-bezier(.2,.7,.3,1);
  }
  .card-stack{animation:floatIn .48s cubic-bezier(.16,.84,.28,1) both;}
  @keyframes floatIn{
    from{opacity:0;transform:translateY(18px) scale(.98);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .flashcard.dragging{transition:none;cursor:grabbing;}
  .stamp{position:absolute;top:22px;padding:7px 16px;border:3px solid;border-radius:8px;font-weight:800;font-size:15px;
    letter-spacing:1px;text-transform:uppercase;opacity:0;pointer-events:none;font-family:var(--sans);}
  .stamp-yes{right:18px;color:#4FAE7C;border-color:#4FAE7C;transform:rotate(12deg);}
  .stamp-no{left:18px;color:var(--danger);border-color:var(--danger);transform:rotate(-12deg);}
  .fc-img{width:112px;height:112px;border-radius:50%;object-fit:cover;margin-bottom:16px;box-shadow:0 6px 16px rgba(0,0,0,0.25);}
  .fc-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:46px;background:var(--card-2);}
  .fc-term-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .fc-term{font-family:var(--serif);font-size:26px;font-weight:700;}
  .fc-translation{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--teal);margin-top:8px;}
  .fc-divider{width:70%;height:1px;background:rgba(0,0,0,0.12);margin:16px 0;}
  .fc-example-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;line-height:1.45;font-style:italic;color:var(--ink-soft);max-width:94%;}
  .speak-inline{background:none;border:none;font-size:17px;cursor:pointer;color:var(--ink-soft);flex-shrink:0;}
  .hint-tap{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:14px;text-align:center;}
  .voice-practice{
    display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin:-4px 0 14px;
  }
  .voice-practice-btn{
    border:1px solid rgba(217,164,65,0.5);background:rgba(217,164,65,0.12);color:var(--accent);
    border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:transform .15s, background .15s, box-shadow .15s;
  }
  .voice-practice-btn:hover{background:rgba(217,164,65,0.2);box-shadow:0 0 16px rgba(217,164,65,0.16);}
  .voice-practice-btn.listening{background:var(--accent);color:var(--accent-ink);animation:micPulse 1s ease-in-out infinite;}
  .voice-practice-status{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .voice-practice-status.ok{color:#9FE0CD;}
  .voice-practice-status.bad{color:#F0A79F;}

  /* Quiz */
  .quiz-term{font-family:var(--serif);font-size:26px;text-align:center;margin:20px 0 26px;}
  .quiz-options{display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto;width:100%;}
  .opt-btn{
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.12);color:var(--text);text-align:left;
    padding:13px 14px;border-radius:var(--radius);font-size:15px;cursor:pointer;
    transition:transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
  }
  .opt-btn:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:0 8px 18px rgba(0,0,0,0.18);}
  .opt-btn.correct{background:rgba(78,148,130,0.25);border-color:var(--teal);}
  .opt-btn.wrong{background:rgba(193,85,77,0.22);border-color:var(--danger);}
  .opt-btn[disabled]{pointer-events:none;}

  /* Lightning / builder trainings */
  .duo-stage{width:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .duo-card{
    width:100%;min-height:250px;border-radius:18px;padding:22px 18px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(155deg, var(--card), #efe5be);color:var(--ink);border:1px solid rgba(0,0,0,0.06);

  .duo-prompt{font-family:var(--serif);font-size:30px;font-weight:800;line-height:1.08;overflow-wrap:anywhere;}
  .duo-sub{font-size:13px;color:var(--ink-soft);margin-top:10px;}
  .lightning-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
  .lightning-option{
    min-height:74px;border-radius:14px;border:1px solid rgba(255,255,255,0.13);background:var(--bg-2);color:var(--text);
    font-size:15px;font-weight:800;padding:14px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,0.18);

  }
  .lightning-option:hover{transform:translateY(-3px);border-color:rgba(217,164,65,0.7);}
  .lightning-option.correct{background:rgba(78,148,130,0.34);border-color:#9FE0CD;color:#DFF9F1;}
  .lightning-option.wrong{background:rgba(193,85,77,0.28);border-color:#F0A79F;color:#FFE5E1;}
  .builder-slots{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:48px;width:100%;}
  .builder-slot{
    min-width:34px;height:42px;border-radius:10px;border:1px solid rgba(217,164,65,0.45);background:rgba(217,164,65,0.09);

  .builder-letters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;}
  .builder-letter{
    min-width:42px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:var(--bg-2);color:var(--text);
    font-size:18px;font-weight:800;cursor:pointer;transition:transform .14s,border-color .14s,opacity .14s;
  }
  .builder-letter:hover{transform:translateY(-2px);border-color:rgba(217,164,65,0.7);}
  .builder-letter.used{opacity:.26;pointer-events:none;}
  .builder-tools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .builder-feedback{font-family:var(--mono);font-size:12px;color:var(--text-muted);min-height:18px;}
  .builder-feedback.ok{color:#9FE0CD;}
  .builder-feedback.bad{color:#F0A79F;}

  /* Orbit */
  .orbit-stage{
    position:relative;width:100%;max-width:520px;min-height:520px;margin:0 auto;
    display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:18px;
    background:
      radial-gradient(circle at 50% 48%, rgba(217,164,65,0.18), transparent 18%),

  }
  .orbit-stage::before{
    content:"";position:absolute;inset:24px;border:1px solid rgba(255,255,255,0.08);border-radius:50%;
    animation:orbitSpin 18s linear infinite;
  }
  .orbit-stage::after{
    content:"";position:absolute;inset:0;opacity:.2;pointer-events:none;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.38) 1px, transparent 1.6px),
      radial-gradient(circle, rgba(217,164,65,0.34) 1px, transparent 1.5px);

    animation:starsDrift 14s linear infinite;

  .orbit-core{
    position:relative;z-index:2;width:190px;min-height:190px;border-radius:50%;

    background:radial-gradient(circle at 40% 26%, #fff4c7, var(--accent) 46%, #9d6f1d 100%);

  .orbit-core span{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;opacity:.72;margin-bottom:8px;}

    position:absolute;width:min(42%,190px);min-height:68px;display:flex;align-items:center;justify-content:center;
    padding:12px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.16);

    box-shadow:0 10px 24px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.08);

    transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    animation:optionFloat 3.8s ease-in-out infinite;animation-delay:var(--float-delay,0s);

  .orbit-option:nth-child(1){left:6%;top:12%;}

  .orbit-option:hover{transform:translateY(-4px) scale(1.03);border-color:rgba(217,164,65,0.72);box-shadow:0 16px 30px rgba(0,0,0,0.32), 0 0 18px rgba(217,164,65,0.15);}
  .orbit-option[disabled]{opacity:1;cursor:default;}
  .orbit-option.correct{background:rgba(78,148,130,0.92);border-color:#9FE0CD;color:#07231c;animation:orbitPop .42s ease both;}
  .orbit-option.wrong{background:rgba(193,85,77,0.88);border-color:#F0A79F;color:#2d0d0a;animation:orbitWrong .36s ease both;}
  .orbit-hint{position:absolute;left:18px;right:18px;bottom:16px;z-index:4;font-family:var(--mono);font-size:11px;color:var(--text-muted);text-align:center;}
  @keyframes orbitSpin{to{transform:rotate(360deg);}}
  @keyframes starsDrift{to{background-position:74px 82px,122px 138px;}}
  @keyframes corePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  @keyframes optionFloat{0%,100%{translate:0 0;}50%{translate:0 -8px;}}

  @keyframes orbitWrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

  .end-stat span{font-size:11px;color:var(--text-muted);text-transform:uppercase;}

  /* Stats view */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .stat-box{position:relative;overflow:hidden;background:linear-gradient(145deg, rgba(255,255,255,0.035), transparent 46%), var(--bg-2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:14px;text-align:center;}
  .stat-box::after{content:"";position:absolute;left:18%;right:18%;bottom:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.55;}
  .stat-box b{display:block;font-family:var(--serif);font-size:24px;color:var(--accent);}
  .stat-box span{font-size:11px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;}

  .hero-panel{text-align:center;padding:26px 16px;}
  .hero-ring{width:136px;height:136px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(78,148,130,0.18);animation:ringPulse 3.2s ease-in-out infinite;}
  @keyframes ringPulse{

    50%{transform:scale(1.025);filter:brightness(1.08);}

  .hero-ring-inner{width:108px;height:108px;border-radius:50%;background:var(--bg-2);display:flex;flex-direction:column;align-items:center;justify-content:center;}

  .hero-caption{font-size:14px;color:var(--text);margin-top:2px;}
  .hero-caption b{color:var(--accent);}

  .seg-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--bg-3);margin:6px 0 12px;}
  .seg-bar .seg{height:100%;transform-origin:left;animation:barGrow .72s cubic-bezier(.16,.84,.28,1) both;transition:width .3s;}
  @keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  .seg-fresh{background:var(--ink-soft);}

  .seg-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--text-muted);}
  .seg-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}

  .group-stat-row{padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .group-stat-row:last-child{border-bottom:none;}
  .group-stat-top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;}

<script>
(function(){
  "use strict";

  /* ---------------- Supabase ---------------- */
  const SUPABASE_URL = 'https://uczpzpdawnarzbfavjtr.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gihTh-0CFWUXVR3bC_TziQ_QtAw4MkI';
  let supaClient = null;
  let session = null;

  const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
  const DAY = 86400000;
  const BOX_INTERVALS = [0,1,2,4,7,14,30]; // days, index = box level

  const LANGS = [
    {code:'en',name:'Английский'},{code:'de',name:'Немецкий'},{code:'es',name:'Испанский'},
    {code:'fr',name:'Французский'},{code:'it',name:'Итальянский'},{code:'pt',name:'Португальский'},
    {code:'tr',name:'Турецкий'},{code:'nl',name:'Нидерландский'},{code:'pl',name:'Польский'},
    {code:'sv',name:'Шведский'},{code:'zh',name:'Китайский'},{code:'ja',name:'Японский'},
    {code:'ko',name:'Корейский'},{code:'ru',name:'Русский'},{code:'et',name:'Эстонский'},{code:'other',name:'Другой'}
  ];
  const EMOJIS = ['📘','🍎','🧭','🌿','🧠','☕','🚀','🏔️','🎯','🛠️','🐝','🎲','🧳','🔥','🌊','⚙️'];

  /* ---------------- app state ---------------- */
  let state = {
    groups: [],   // {id,name,emoji,lang}
    words: [],    // {id,groupId,term,translation,example,image,box,nextReview,correct,wrong,createdAt}
    stats: {streak:0,lastDate:null,totalReviews:0},
    view: 'library',
    activeGroup: 'all',
    modal: null
  };

  /* ---------------- DB <-> app object mapping ---------------- */
  function dbToGroup(r){
    return {id:r.id, name:r.name, emoji:r.emoji, lang:r.lang, createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()};
  }
  function dbToWord(r){
    return {
      id:r.id, groupId:r.group_id, term:r.term, translation:r.translation,
      example:r.example||'', image:r.image||null, box:r.box||0,
      nextReview: r.next_review ? new Date(r.next_review).getTime() : Date.now(),
      correct:r.correct||0, wrong:r.wrong||0,
      createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()
    };
  }

  async function loadAll(){
    const [groupsRes, wordsRes, statsRes] = await Promise.all([
      supaClient.from('groups').select('*').order('created_at', {ascending:true}),
      supaClient.from('words').select('*').order('created_at', {ascending:false}),
      supaClient.from('user_stats').select('*').maybeSingle()
    ]);
    if(groupsRes.error) console.error(groupsRes.error);
    if(wordsRes.error) console.error(wordsRes.error);
    state.groups = (groupsRes.data||[]).map(dbToGroup);
    state.words = (wordsRes.data||[]).map(dbToWord);
    const sr = statsRes.data;
    state.stats = sr ? {streak:sr.streak||0, lastDate:sr.last_date||null, totalReviews:sr.total_reviews||0} : {streak:0,lastDate:null,totalReviews:0};

    if(state.groups.length === 0 && state.words.length === 0){
      // seed a starter group so the app isn't empty on first run
      const g = {id:uid(), name:'Мои слова', emoji:'📘', lang:'en'};
      await insertGroupRow(g);
      state.groups.push(g);
    }
  }

  async function insertGroupRow(g){
    const {error} = await supaClient.from('groups').insert({id:g.id, name:g.name, emoji:g.emoji, lang:g.lang});
    if(error){ console.error(error); toast('Не удалось сохранить группу'); }
  }

  async function insertWordRow(w){

  async function wikiImage(term, lang){
    const l = (lang && lang!=='other') ? lang : 'en';
    const url = `https://${l}.wikipedia.org/w/api.php?origin=*&action=query&prop=pageimages&format=json&piprop=thumbnail&pithumbsize=360&generator=search&gsrsearch=${encodeURIComponent(term)}&gsrlimit=4`;
    const data = await fetchJsonWithTimeout(url, 7000);
    const pages = data && data.query && data.query.pages;
    if(!pages) return null;
    const page = Object.values(pages).find(p=>p.thumbnail && p.thumbnail.source);
    return page && page.thumbnail && page.thumbnail.source ? page.thumbnail.source : null;
  }
  async function commonsImage(term){
    const searchUrl = `https://commons.wikimedia.org/w/api.php?origin=*&action=query&format=json&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(term)}&gsrlimit=6&prop=imageinfo&iiprop=url&iiurlwidth=360`;
    const data = await fetchJsonWithTimeout(searchUrl, 7000);
    const pages = data && data.query && data.query.pages;
    if(!pages) return null;
    const page = Object.values(pages).find(p=>p.imageinfo && p.imageinfo[0] && (p.imageinfo[0].thumburl || p.imageinfo[0].url));
    if(!page) return null;
    return page.imageinfo[0].thumburl || page.imageinfo[0].url || null;
  }
  async function fetchImage(term, lang){
    const clean = (term||'').trim();
    if(!clean) return null;
    const queries = Array.from(new Set([clean, clean.split(/\s+/).slice(0,2).join(' ')]));
    const langs = Array.from(new Set([(lang && lang!=='other') ? lang : 'en', 'en']));
    for(const q of queries){
      for(const l of langs){
        try{
          const img = await wikiImage(q, l);
          if(img) return img;
        }catch(e){}
      }
      try{
        const img = await commonsImage(q);
        if(img) return img;
      }catch(e){}
    }
    return null;
  }

  async function fetchJsonWithTimeout(url, ms){
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), ms || 8000);
    try{
      const res = await fetch(url, {signal:ctrl.signal});
      if(!res.ok) throw new Error('bad response');
      return await res.json();
    } finally {
      clearTimeout(timer);
    }
  }
  async function autoTranslateTerm(term){
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(term)}&langpair=en|ru`;
    const data = await fetchJsonWithTimeout(url, 8000);
    const translated = data && data.responseData && data.responseData.translatedText;
    return translated && translated.toLowerCase()!==term.toLowerCase() ? translated : '';
  }
  async function autoExampleTerm(term){
    try{
      const data = await fetchJsonWithTimeout(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(term)}`, 8000);
      const entries = Array.isArray(data) ? data : [];
      for(const entry of entries){
        for(const meaning of (entry.meanings||[])){
          for(const def of (meaning.definitions||[])){
            if(def.example) return def.example;
          }
        }
      }
    }catch(e){}
    return `I want to remember the word "${term}" and use it in a real sentence.`;
  }
  async function fillWordDetails(term, statusEl){
    const clean = (term||'').trim();
    if(!clean){ toast('Сначала введи или надиктуй слово'); return; }

  function normalizeSpeechText(text){
    return (text||'')
      .toLowerCase()
      .replace(/[’']/g,'')
      .replace(/[^a-zа-яё0-9\s-]/gi,' ')
      .replace(/\s+/g,' ')
      .trim();
  }
  function editDistance(a,b){
    a = normalizeSpeechText(a);
    b = normalizeSpeechText(b);
    if(a===b) return 0;
    const dp = Array.from({length:a.length+1}, (_,i)=>[i]);
    for(let j=1;j<=b.length;j++) dp[0][j]=j;
    for(let i=1;i<=a.length;i++){
      for(let j=1;j<=b.length;j++){
        dp[i][j] = Math.min(
          dp[i-1][j] + 1,
          dp[i][j-1] + 1,
          dp[i-1][j-1] + (a[i-1]===b[j-1] ? 0 : 1)
        );
      }
    }
    return dp[a.length][b.length];
  }
  function speechMatches(spoken, expected){
    const a = normalizeSpeechText(spoken);
    const b = normalizeSpeechText(expected);
    if(!a || !b) return false;
    if(a===b || a.includes(b) || b.includes(a)) return true;
    const maxLen = Math.max(a.length, b.length);
    const distance = editDistance(a,b);
    return distance <= Math.max(1, Math.floor(maxLen * 0.22));
  }

  function revealMotion(scope){
    const items = Array.from(scope.querySelectorAll('.reveal'));
    if(!items.length) return;
    if(!('IntersectionObserver' in window)){
      items.forEach(el=>el.classList.add('in'));
      return;
    }
    const io = new IntersectionObserver((entries, observer)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('in');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });
    items.forEach((el,i)=>{
      el.style.setProperty('--d', `${Math.min(i*70, 420)}ms`);
      io.observe(el);
    });
  }

  function parseBulkText(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const rows = [];
    for(const line of lines){
      let parts;
      if(line.includes('\t')) parts = line.split('\t');
      else if(line.includes(';')) parts = line.split(';');
      else parts = line.split(',');
      parts = parts.map(p=>p.trim());
      if(parts.length>=2 && parts[0] && parts[1]){
        rows.push({term:parts[0], translation:parts[1], example:parts[2]||''});
      }
    }
    return rows;
  }

          const name = f.name.toLowerCase();
          const isExcel = name.endsWith('.xlsx') || name.endsWith('.xls');
          if(isExcel){
            if(typeof XLSX === 'undefined'){ toast('Не удалось загрузить модуль для Excel. Попробуй сохранить файл как .csv'); return; }
            const reader = new FileReader();
            reader.onload = (e)=>{
              try{
                const wb = XLSX.read(e.target.result, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:''});
                const lines = rows
                  .map(r => (r||[]).map(c=>String(c==null?'':c).trim()))
                  .filter(r => r.length>=2 && r[0] && r[1])
                  .map(r => r.slice(0,3).join('\t'));
                textArea.value = lines.join('\n');
                updatePreview();
                if(lines.length===0) toast('В файле не нашлось строк вида слово / перевод');
              }catch(err){
                toast('Не получилось прочитать этот Excel-файл');
              }
            };
            reader.readAsArrayBuffer(f);
          } else {
            const reader = new FileReader();
            reader.onload = ()=>{ textArea.value = reader.result; updatePreview(); };
            reader.readAsText(f);
          }
        };
      }
      root.querySelector('#b-save').onclick = async ()=>{

        closeModal();
        renderView();
        toast(`Импортировано слов: ${newWords.length}`);
        await insertWordsRows(newWords);
        const g = groupById(groupId);
        Promise.all(newWords.map(w => fetchImage(w.term, g && g.lang).then(img => ({id:w.id, img}))))
          .then(results=>{
            let changed = false;
            results.forEach(r=>{

              if(found){ found.image = r.img; changed = true; updateWordImageRow(r.id, r.img); }
            });
            if(changed && state.view==='library') renderView();

      };
    }

  /* ================= SESSION ENGINE ================= */
  function startSession(mode, groupId){
    if(mode==='combo'){
      let pool = wordsIn(groupId);
      if(pool.length<4){ toast('Для комбо-тренировки нужно минимум 4 слова'); return; }
      let due = dueWords(pool);
      const basePool = (due.length>=Math.min(5,pool.length)) ? due : pool.slice();
      state.combo = { pool: basePool, groupId, stages:['flash','quiz','type','match'], stageIndex:0, aggCorrect:0, aggWrong:0 };
      launchComboStage();
      return;
    }
    let pool = wordsIn(groupId);
    if(pool.length===0){ toast('В этой группе пока нет слов'); return; }
    if((mode==='orbit' || mode==='lightning') && pool.length<2){ toast('Для этого режима нужно минимум 2 слова'); return; }
    let due = dueWords(pool);
    let queue = (due.length>=Math.min(5,pool.length)) ? due : pool.slice();
    // shuffle
    queue = queue.slice().sort(()=>Math.random()-0.5);
    if(mode!=='match') queue = queue.slice(0, Math.min(15, queue.length));

    state.session = {
      mode, groupId, queue, idx:0,
      correct:0, wrong:0, flipped:false,
      direction: state.practiceDirection || 'normal',
      matchState: mode==='match' ? buildMatchState(queue.slice(0,6)) : null,
      finished:false
    };
    renderView();
  }

  function launchComboStage(){
    const c = state.combo;
    const stageMode = c.stages[c.stageIndex];
    let queue = c.pool.slice().sort(()=>Math.random()-0.5);
    if(stageMode!=='match') queue = queue.slice(0, Math.min(15, queue.length));
    state.session = {
      mode: stageMode, groupId: c.groupId, queue, idx:0,
      correct:0, wrong:0, flipped:false,
      direction: state.practiceDirection || 'normal',
      matchState: stageMode==='match' ? buildMatchState(queue.slice(0,6)) : null,
      finished:false
    };
    renderView();
  }

  function finishSession(){
    const s = state.session;
    if(state.combo){
      const c = state.combo;
      c.aggCorrect += s.mode==='match' ? s.matchState.pairs.length : s.correct;
      c.aggWrong += s.mode==='match' ? 0 : s.wrong;
      c.stageIndex++;
      if(c.stageIndex < c.stages.length){
        launchComboStage();
        return;
      }
      state.session = { mode:'combo-end', groupId:c.groupId, correct:c.aggCorrect, wrong:c.aggWrong };
      state.combo = null;
      renderView();
      return;
    }
    renderView();
  }

  function promptText(w, s){ return (s && s.direction==='reverse') ? w.translation : w.term; }
  function answerText(w, s){ return (s && s.direction==='reverse') ? w.term : w.translation; }
  function promptLang(w, s, g){ return (s && s.direction==='reverse') ? 'ru' : (g && g.lang); }
  function stageName(m){ return ({flash:'Флеш-карточки', quiz:'Тест', orbit:'Словесная орбита', lightning:'Молния', builder:'Собери слово', type:'Ввод перевода', match:'Найди пару'})[m] || ''; }

  function currentWord(){ const s=state.session; return s.queue[s.idx]; }
  function answerOptions(w,s,count){
    const correctAns = answerText(w,s);
    const local = state.words.filter(x=>x.id!==w.id && x.groupId===w.groupId);
    const global = state.words.filter(x=>x.id!==w.id);
    const pool = (local.length>=count-1 ? local : global).slice().sort(()=>Math.random()-0.5);
    const opts = [correctAns];
    pool.forEach(x=>{
      const txt = answerText(x,s);
      if(txt && !opts.includes(txt) && opts.length<count) opts.push(txt);
    });
    return opts.sort(()=>Math.random()-0.5);
  }
  function normalizeBuildText(text){
    return Array.from((text||'').toLowerCase()).filter(ch=>/[\p{L}\p{N}]/u.test(ch)).join('');
  }
  function buildLettersFor(text){
    return Array.from(normalizeBuildText(text)).map((ch,i)=>({id:i+'-'+ch, ch})).sort(()=>Math.random()-0.5);
  }

  function gradeWord(w, ok){
    if(ok){
      w.box = Math.min((w.box||0)+1, 6);
      w.correct = (w.correct||0)+1;
    } else {
      w.box = 0;
      w.wrong = (w.wrong||0)+1;
    }
    w.nextReview = Date.now() + BOX_INTERVALS[w.box]*DAY;
    updateWordProgressRow(w);
    state.stats.totalReviews = (state.stats.totalReviews||0)+1;
    touchStreak();
  }

  function advance(ok){
    const s = state.session;
    const w = currentWord();
    if(w) gradeWord(w, ok);
    if(ok) s.correct++; else s.wrong++;
    s.idx++;
    s.flipped = false;
    if(s.idx >= s.queue.length){ s.finished = true; finishSession(); return; }
    renderView();
  }

  function sessionView(){
    const s = state.session;
    if(s.mode==='combo-end') return comboEndHtml();
    if(s.finished) return sessionEndHtml();
    if(s.mode==='flash') return flashHtml();
    if(s.mode==='quiz') return quizHtml();
    if(s.mode==='orbit') return orbitHtml();
    if(s.mode==='lightning') return lightningHtml();
    if(s.mode==='builder') return builderHtml();
    if(s.mode==='type') return typeHtml();
    if(s.mode==='match') return matchHtml();
    return '';
  }

  function sessionTopHtml(){
    const s = state.session;
    const total = s.mode==='match' ? (s.matchState.pairs.length) : s.queue.length;
    const done = s.mode==='match' ? s.matchState.solved.length : s.idx;
    const pct = total? Math.round(100*done/total) : 0;
    const comboLabel = state.combo ? `<div class="combo-label">Этап ${state.combo.stageIndex+1}/${state.combo.stages.length} · ${stageName(s.mode)}</div>` : '';
    return `
      ${comboLabel}
      <div class="session-top">
        <span>${done}/${total}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <button class="session-exit" data-exit="1" type="button"><span>✕</span><span>Выйти</span></button>
      </div>`;
  }

  function quizHtml(){
    const s = state.session;
    const w = currentWord();
    if(!s._opts || s._optsFor!==w.id){
      const others = state.words.filter(x=>x.id!==w.id && x.groupId===w.groupId);
      const pool = others.length>=3 ? others : state.words.filter(x=>x.id!==w.id);
      const distractors = pool.slice().sort(()=>Math.random()-0.5).slice(0,3).map(x=>answerText(x,s));
      const correctAns = answerText(w,s);
      const opts = distractors.concat([correctAns]).sort(()=>Math.random()-0.5);
      s._opts = opts; s._optsFor = w.id; s._answered=false;
    }
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="quiz-term">${esc(promptText(w,s))}</div>
      <div class="quiz-options">
        ${s._opts.map(o=>`<button class="opt-btn" data-answer="${esc(o)}">${esc(o)}</button>`).join('')}
      </div>
    </div>`;
  }

  function orbitHtml(){
    const s = state.session;
    const w = currentWord();
    if(!s._opts || s._optsFor!==w.id){
      const correctAns = answerText(w,s);
      const local = state.words.filter(x=>x.id!==w.id && x.groupId===w.groupId);
      const global = state.words.filter(x=>x.id!==w.id);
      const pool = (local.length>=3 ? local : global).slice().sort(()=>Math.random()-0.5);
      const opts = [correctAns];
      pool.forEach(x=>{
        const txt = answerText(x,s);
        if(txt && !opts.includes(txt) && opts.length<4) opts.push(txt);
      });
      s._opts = opts.sort(()=>Math.random()-0.5);
      s._optsFor = w.id;
      s._answered = false;
    }
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="orbit-stage">
        <div class="orbit-core">
          <span>найди перевод</span>
          <b>${esc(promptText(w,s))}</b>
        </div>
        <div class="orbit-options">
          ${s._opts.map((o,i)=>`<button class="orbit-option" style="--float-delay:${i*-0.45}s" data-orbit-answer="${esc(o)}">${esc(o)}</button>`).join('')}
        </div>
        <div class="orbit-hint">выбери правильную орбиту, пока слово держится в центре</div>

  }

      <div class="quiz-term">${esc(promptText(w,s))}</div>

  function buildMatchState(words){
    const left = words.map(w=>({key:w.id, side:'term', text:w.term, id:w.id}));
    const right = words.map(w=>({key:w.id, side:'trans', text:w.translation, id:w.id}));
    const cards = left.concat(right).sort(()=>Math.random()-0.5);
    return {cards, pairs:words, solved:[], selected:null};
  }

  function matchHtml(){
    const s = state.session;
    const ms = s.matchState;
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="match-grid">
        ${ms.cards.map((c,i)=>{
          const solved = ms.solved.includes(c.id);
          const sel = ms.selected && ms.selected.i===i;
          return `<div class="match-card ${solved?'done':''} ${sel?'sel':''}" data-mi="${i}">${esc(c.text)}</div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function bindSession(){
    const s = state.session;
    root.querySelectorAll('[data-exit]').forEach(b=>b.onclick = ()=>{ state.session=null; state.combo=null; renderView(); });
    if(s.mode==='combo-end'){
      const again = root.querySelector('[data-again-combo]');
      if(again) again.onclick = ()=> startSession('combo', s.groupId);
      return;
    }
    if(s.finished){
      const again = root.querySelector('[data-again]');
      if(again) again.onclick = ()=> startSession(s.mode, s.groupId);
      return;
    }
    if(s.mode==='flash'){
      const fc = root.querySelector('#fc');
      const stampYes = root.querySelector('#stamp-yes');
      const stampNo = root.querySelector('#stamp-no');
      const sb = root.querySelector('[data-speak-fc]');
      if(sb) sb.onclick = (e)=>{ e.stopPropagation(); const w=currentWord(); const g=groupById(w.groupId); speak(promptText(w,s), promptLang(w,s,g)); };
      const sbEx = root.querySelector('[data-speak-ex]');
      if(sbEx) sbEx.onclick = (e)=>{ e.stopPropagation(); const w=currentWord(); const g=groupById(w.groupId); speak(w.example, g&&g.lang); };
      const voiceBtn = root.querySelector('#fc-voice');
      const voiceStatus = root.querySelector('#fc-voice-status');
      if(voiceBtn){
        const Rec = recognitionCtor();
        if(!Rec){
          voiceBtn.disabled = true;
          if(voiceStatus) voiceStatus.textContent = 'браузер не поддерживает';
        } else {
          voiceBtn.onclick = (e)=>{
            e.stopPropagation();
            const w = currentWord();
            const g = groupById(w.groupId);
            const expected = s.direction==='reverse' ? answerText(w,s) : promptText(w,s);
            const rec = new Rec();
            rec.lang = speechLang(g && g.lang);
            rec.interimResults = false;
            rec.maxAlternatives = 3;
            voiceBtn.classList.add('listening');
            if(voiceStatus){ voiceStatus.textContent = 'слушаю...'; voiceStatus.className = 'voice-practice-status'; }
            rec.onresult = (event)=>{
              const result = event.results && event.results[0];
              const variants = result ? Array.from(result).map(x=>x.transcript || '') : [];
              const ok = variants.some(txt=>speechMatches(txt, expected));
              if(ok){
                if(voiceStatus){ voiceStatus.textContent = 'отлично'; voiceStatus.className = 'voice-practice-status ok'; }
                s.flipped = true;
                setTimeout(()=>renderView(), 360);
              } else {
                const heard = normalizeSpeechText(variants[0] || '');
                if(voiceStatus){ voiceStatus.textContent = heard ? `услышал: ${heard}` : 'не расслышал'; voiceStatus.className = 'voice-practice-status bad'; }
              }
            };
            rec.onerror = ()=>{
              if(voiceStatus){ voiceStatus.textContent = 'микрофон не сработал'; voiceStatus.className = 'voice-practice-status bad'; }
            };
            rec.onend = ()=>{ voiceBtn.classList.remove('listening'); };
            try{ rec.start(); }catch(err){ voiceBtn.classList.remove('listening'); }
          };
        }
      }

      if(fc){
        let startX=0, startY=0, dx=0, dragging=false, pointerId=null;
        const THRESHOLD = 90;

        function onDown(e){
          if(e.target.closest('[data-speak-fc]') || e.target.closest('[data-speak-ex]')) return;
          pointerId = e.pointerId;
          startX = e.clientX; startY = e.clientY; dx = 0; dragging = false;
          fc.setPointerCapture(pointerId);
        }
        function onMove(e){
          if(pointerId===null || e.pointerId!==pointerId) return;
          const ddx = e.clientX - startX;
          const ddy = e.clientY - startY;
          if(!dragging && Math.abs(ddx) < 6) return;
          if(!dragging && Math.abs(ddy) > Math.abs(ddx)) return; // vertical scroll intent, ignore
          dragging = true;
          dx = ddx;
          fc.classList.add('dragging');
          fc.style.transform = `translateX(${dx}px) rotate(${dx/18}deg)`;
          const frac = Math.min(Math.abs(dx)/THRESHOLD, 1);
          if(dx>0){ stampYes.style.opacity = frac; stampNo.style.opacity = 0; }
          else { stampNo.style.opacity = frac; stampYes.style.opacity = 0; }
        }
        function onUp(e){
          if(pointerId===null || e.pointerId!==pointerId) return;
          fc.classList.remove('dragging');
          if(dragging && Math.abs(dx) > THRESHOLD){
            const ok = dx > 0;
            const flyX = ok ? window.innerWidth : -window.innerWidth;
            fc.style.transform = `translateX(${flyX}px) rotate(${dx/18}deg)`;
            fc.style.opacity = '0';
            setTimeout(()=> advance(ok), 220);
          } else if(dragging){
            fc.style.transform = '';
            stampYes.style.opacity = 0; stampNo.style.opacity = 0;
          } else {
            s.flipped = !s.flipped; renderView();
          }
          pointerId = null; dragging = false; dx = 0;
        }
        fc.onpointerdown = onDown;
        fc.onpointermove = onMove;
        fc.onpointerup = onUp;
        fc.onpointercancel = onUp;
      }
    }
    if(s.mode==='quiz'){
      root.querySelectorAll('[data-answer]').forEach(b=>{
        b.onclick = ()=>{
          if(s._answered) return;
          s._answered = true;
          const w = currentWord();
          const correctAns = answerText(w,s);
          const ok = b.dataset.answer===correctAns;
          root.querySelectorAll('[data-answer]').forEach(o=>{
            o.setAttribute('disabled','1');
            if(o.dataset.answer===correctAns) o.classList.add('correct');
            else if(o===b) o.classList.add('wrong');
          });
          setTimeout(()=>advance(ok), 700);
        };
      });
    }
    if(s.mode==='orbit'){
      root.querySelectorAll('[data-orbit-answer]').forEach(b=>{
        b.onclick = ()=>{
          if(s._answered) return;
          s._answered = true;
          const w = currentWord();
          const correctAns = answerText(w,s);
          const ok = b.dataset.orbitAnswer===correctAns;
          root.querySelectorAll('[data-orbit-answer]').forEach(o=>{
            o.setAttribute('disabled','1');
            if(o.dataset.orbitAnswer===correctAns) o.classList.add('correct');
            else if(o===b) o.classList.add('wrong');
          });
          setTimeout(()=>advance(ok), ok ? 620 : 820);
        };
      });
    }
    if(s.mode==='lightning'){
      root.querySelectorAll('[data-lightning-answer]').forEach(b=>{
        b.onclick = ()=>{
          if(s._answered) return;
          s._answered = true;
          const w = currentWord();
          const correctAns = answerText(w,s);
          const ok = b.dataset.lightningAnswer===correctAns;
          root.querySelectorAll('[data-lightning-answer]').forEach(o=>{
            o.setAttribute('disabled','1');
            if(o.dataset.lightningAnswer===correctAns) o.classList.add('correct');
            else if(o===b) o.classList.add('wrong');
          });
          setTimeout(()=>advance(ok), ok ? 420 : 720);
        };
      });
    }
    if(s.mode==='builder'){
      function checkBuild(){
        if(!s._build || s._build.checked) return;
        const fb = root.querySelector('#build-feedback');
        const w = currentWord();
        const target = normalizeBuildText(answerText(w,s));
        const value = s._build.picked.map(x=>x.ch).join('');
        if(value.length < target.length){
          if(fb){ fb.textContent = 'ещё не все буквы'; fb.className = 'builder-feedback bad'; }
          return;
        }
        s._build.checked = true;
        const ok = value === target;
        if(fb){ fb.textContent = ok ? 'собрано верно' : `правильно: ${answerText(w,s)}`; fb.className = 'builder-feedback ' + (ok?'ok':'bad'); }
        setTimeout(()=>advance(ok), ok ? 520 : 920);
      }
      root.querySelectorAll('[data-build-letter]').forEach(btn=>{
        btn.onclick = ()=>{
          if(!s._build || s._build.checked) return;
          const i = parseInt(btn.dataset.buildLetter,10);
          if(s._build.picked.some(p=>p.i===i)) return;
          const letter = s._build.letters[i];
          if(!letter) return;
          s._build.picked.push({i, ch:letter.ch});
          const targetLen = normalizeBuildText(answerText(currentWord(),s)).length;
          if(s._build.picked.length >= targetLen){
            renderView();
            setTimeout(()=>{
              const currentFb = root.querySelector('#build-feedback');
              if(currentFb) currentFb.textContent = 'проверяю...';
              checkBuild();
            }, 40);
          } else {
            renderView();
          }
        };
      });
      const back = root.querySelector('#build-back');
      if(back) back.onclick = ()=>{
        if(!s._build || s._build.checked) return;
        s._build.picked.pop();
        renderView();
      };
      const check = root.querySelector('#build-check');
      if(check) check.onclick = checkBuild;
    }
    if(s.mode==='type'){
      const input = root.querySelector('#type-in');
      const fb = root.querySelector('#type-fb');
      const check = root.querySelector('#type-check');
      function doCheck(){
        if(check.disabled) return;
        check.disabled = true;
        const w = currentWord();
        const correctAns = answerText(w,s);
        const val = (input.value||'').trim().toLowerCase();
        const ok = val === (correctAns||'').trim().toLowerCase();
        fb.textContent = ok ? '✓ верно!' : `✕ верный ответ: ${correctAns}`;
        fb.className = 'type-feedback ' + (ok?'ok':'bad');
        setTimeout(()=>advance(ok), 900);
      }
      if(check) check.onclick = doCheck;
      if(input){
        input.focus();
        input.onkeydown = (e)=>{ if(e.key==='Enter') doCheck(); };
      }
    }
    if(s.mode==='match'){
      const ms = s.matchState;
      root.querySelectorAll('[data-mi]').forEach(el=>{
        el.onclick = ()=>{
          const i = parseInt(el.dataset.mi,10);
          const card = ms.cards[i];
          if(ms.solved.includes(card.id)) return;
          if(!ms.selected){ ms.selected = {i, card}; renderView(); return; }
          if(ms.selected.i===i){ ms.selected=null; renderView(); return; }
          if(ms.selected.card.id===card.id && ms.selected.card.side!==card.side){
            ms.solved.push(card.id);
            ms.selected = null;
            const w = state.words.find(x=>x.id===card.id);
            if(w) gradeWord(w, true);
            if(ms.solved.length===ms.pairs.length){
              s.finished=true;
              finishSession();
            } else {
              renderView();
            }
          } else {
            el.classList.add('wrong-flash');
            const prevI = ms.selected.i;
            ms.selected = null;
            setTimeout(()=>{ renderView(); }, 450);
          }
        };
      });
    }
  }

  /* ================= STATS ================= */
  function statsView(){
    const total = state.words.length;
    if(total === 0){
      return `<div class="empty-state"><div class="big-emoji">📊</div><p>Как только добавишь слова и потренируешься — здесь появится статистика.</p></div>`;
    }
    const learned = state.words.filter(w=>(w.box||0)>=5).length;
    const learning = state.words.filter(w=>{ const b=w.box||0; return b>=2 && b<5; }).length;
    const fresh = total - learned - learning;
    const due = dueWords(state.words).length;
    const pct = Math.round(100*learned/total);

    let attempts=0, correct=0;
    state.words.forEach(w=>{ attempts += (w.correct||0)+(w.wrong||0); correct += (w.correct||0); });
    const accuracy = attempts>0 ? Math.round(100*correct/attempts) : null;

    return `
      <div class="panel hero-panel reveal soft-glow">
        <div class="hero-ring" style="background:conic-gradient(var(--teal) ${pct}%, var(--bg-3) 0)">
          <div class="hero-ring-inner">
            <b>${pct}%</b>
            <span>выучено</span>
          </div>
        </div>
        <div class="hero-caption">Выучено <b>${learned}</b> слов из <b>${total}</b></div>
      </div>

      <div class="stat-grid">
        <div class="stat-box reveal soft-glow"><b>${due}</b><span>на повтор сегодня</span></div>
        <div class="stat-box reveal soft-glow"><b>${accuracy!==null ? accuracy+'%' : '—'}</b><span>точность ответов</span></div>
      </div>

      <div class="panel reveal">
        <span class="eyebrow">Прогресс по словам</span>
        <div class="seg-bar">
          ${fresh>0?`<div class="seg seg-fresh" style="width:${fresh/total*100}%"></div>`:''}
          ${learning>0?`<div class="seg seg-learning" style="width:${learning/total*100}%"></div>`:''}
          ${learned>0?`<div class="seg seg-learned" style="width:${learned/total*100}%"></div>`:''}
        </div>
        <div class="seg-legend">
          <span><span class="dot" style="background:var(--ink-soft)"></span>Новые — ${fresh}</span>
          <span><span class="dot" style="background:var(--accent)"></span>Учу — ${learning}</span>
          <span><span class="dot" style="background:var(--teal)"></span>Выучено — ${learned}</span>
        </div>
        <div class="hint">Слово переходит из «Новые» в «Учу», а потом в «Выучено» по мере того, как ты правильно отвечаешь на тренировках. Ошибка возвращает его в начало.</div>
      </div>

      <div class="panel reveal">
        <span class="eyebrow">По группам</span>
        ${state.groups.map(g=>{
          const gw = wordsIn(g.id);
          const n = gw.length;
          const m = gw.filter(w=>(w.box||0)>=5).length;
          const gpct = n>0 ? Math.round(100*m/n) : 0;
          return `<div class="group-stat-row">
            <div class="group-stat-top">
              <span class="gname">${g.emoji} ${esc(g.name)}</span>
              <span class="gnum">${m}/${n}</span>
            </div>
            <div class="group-stat-bar"><div class="group-stat-fill" style="width:${gpct}%"></div></div>
          </div>`;
        }).join('') || '<div class="hint">Пока нет групп.</div>'}
      </div>
    `;
  }

  /* ---------------- auth screen ---------------- */
  function loginHtml(){
    return `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-brand">Карто<span>тека</span></div>
        <p>Личный архив слов. Вход по почте — без пароля. Слова будут доступны с любого устройства.</p>
        <input type="text" id="auth-email" placeholder="твоя почта" autocomplete="email">
        <div style="margin-top:12px;"><button class="btn btn-accent btn-block" id="auth-send">Отправить ссылку для входа</button></div>
        <div id="auth-msg" class="auth-msg"></div>
      </div>
    </div>`;
  }
  function bindLogin(){
    const btn = document.getElementById('auth-send');
    if(!btn) return;
    const emailInput = document.getElementById('auth-email');
    const msg = document.getElementById('auth-msg');
    const send = async ()=>{
      const email = (emailInput.value||'').trim();
      if(!email || !email.includes('@')){ msg.textContent='Введи корректную почту'; msg.style.color='#F0A79F'; return; }
      btn.disabled = true; btn.textContent = 'Отправляю…';
      const redirectTo = window.location.href.split('#')[0].split('?')[0];
      const { error } = await supaClient.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTo } });
      btn.disabled = false; btn.textContent = 'Отправить ссылку для входа';
      if(error){ msg.textContent = 'Ошибка отправки: '+error.message; msg.style.color='#F0A79F'; }
      else { msg.textContent = 'Ссылка отправлена! Открой почту на этом устройстве и перейди по ссылке.'; msg.style.color='#9FE0CD'; }
    };
    btn.onclick = send;
    emailInput.onkeydown = (e)=>{ if(e.key==='Enter') send(); };
  }
  function showLogin(){
    root.innerHTML = loginHtml();
    bindLogin();
  }

  /* ---------------- init ---------------- */
  let bootedFor = null;
  async function boot(){
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);font-family:var(--mono);">загрузка картотеки…</div>`;
    await loadAll();
    render();
    repairMissingImages(30);
  }
  (function init(){
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);font-family:var(--mono);">подключение…</div>`;
    if(typeof supabase === 'undefined'){
      root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);">Не удалось загрузить модуль базы данных. Проверь интернет-соединение и обнови страницу.</div>`;
      return;
    }
    supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    supaClient.auth.onAuthStateChange((event, sess)=>{
      session = sess;
      if(session){
        if(bootedFor !== session.user.id){ bootedFor = session.user.id; boot(); }
      } else {
        bootedFor = null;
        showLogin();
      }
    });
  })();

})();
</script>
</body>
</html>
