<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordBoost</title>
<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#182420">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#182420;
    --bg-2:#1F2E28;
    --bg-3:#25352E;
    --card:#F3EEd8;
    --card-2:#EAE3C4;
    --ink:#20281F;
    --ink-soft:#4B5A4E;
    --text:#EAE7D6;
    --text-muted:#8FA79B;
    --accent:#D9A441;
    --accent-ink:#3A2A0E;
    --teal:#4E9482;
    --danger:#C1554D;
    --danger-ink:#3a1512;
    --radius:6px;
    --serif:Georgia,'Iowan Old Style','Palatino Linotype',Palatino,serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(217,164,65,0.06), transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(78,148,130,0.08), transparent 45%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:820px;margin:0 auto;padding:20px 16px 96px;}

  /* Header */
  .app-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;padding:4px 2px;}
  .brand{display:flex;flex-direction:column;}
  .brand-title{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:0.5px;color:var(--text);}
  .brand-title span{color:var(--accent);}
  .brand-sub{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-top:2px;}
  .streak-badge{font-family:var(--mono);font-size:13px;background:var(--bg-3);border:1px solid rgba(217,164,65,0.35);color:var(--accent);padding:6px 10px;border-radius:var(--radius);display:flex;align-items:center;gap:6px;white-space:nowrap;}

  /* Tabs */
  .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:var(--bg-2);border-top:1px solid rgba(255,255,255,0.08);z-index:40;}
  .bottom-nav-inner{max-width:820px;margin:0 auto;display:flex;padding:6px 10px calc(6px + env(safe-area-inset-bottom));}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
    color:var(--text-muted);font-family:var(--mono);font-size:10.5px;padding:8px 4px;cursor:pointer;border-radius:8px;}
  .nav-btn .nav-icon{font-size:21px;line-height:1;}
  .nav-btn.active{color:var(--accent);}

  h2.section-title{font-family:var(--serif);font-size:20px;font-weight:700;margin:0 0 14px;color:var(--text);}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:4px;display:block;}

  /* Buttons */
  .btn{
    font-family:var(--sans);font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid transparent;
    padding:9px 16px;cursor:pointer;transition:transform .08s ease, filter .15s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-accent{background:var(--accent);color:var(--accent-ink);}
  .btn-accent:hover{filter:brightness(1.08);}
  .btn-teal{background:var(--teal);color:#0d211c;}
  .btn-teal:hover{filter:brightness(1.1);}
  .btn-ghost{background:transparent;color:var(--text);border-color:rgba(255,255,255,0.18);}
  .btn-ghost:hover{border-color:rgba(255,255,255,0.4);}
  .btn-danger{background:transparent;color:var(--danger);border-color:rgba(193,85,77,0.5);}
  .btn-danger:hover{background:rgba(193,85,77,0.12);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-block{width:100%;}
  .btn[disabled]{opacity:0.4;cursor:not-allowed;}

  /* Cards / panels */
  .panel{background:var(--bg-2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:16px;margin-bottom:16px;}

  /* Group tabs (folder tabs) */
  .group-row{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding:2px 2px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .group-row::-webkit-scrollbar{display:none;}
  .group-chip{
    flex-shrink:0;font-family:var(--mono);font-size:12.5px;padding:9px 15px;border-radius:999px;
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);white-space:nowrap;
    cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,border-color .15s,color .15s;
  }
  .group-chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700;}
  .group-chip .count{opacity:0.7;font-size:11px;}
  .group-chip.add{border-style:dashed;color:var(--accent);background:transparent;}

  .fab{
    position:fixed;right:20px;bottom:86px;z-index:41;width:56px;height:56px;border-radius:50%;
    background:var(--accent);color:var(--accent-ink);border:none;font-size:26px;font-weight:400;line-height:1;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,0,0,0.45);cursor:pointer;
    transition:transform .15s;
  }
  .fab:active{transform:scale(0.94);}
  .fab-backdrop{position:fixed;inset:0;z-index:39;}
  .fab-menu{position:fixed;right:20px;bottom:152px;z-index:41;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
  .fab-menu-item{
    display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid rgba(255,255,255,0.14);
    color:var(--text);padding:11px 18px;border-radius:999px;font-size:13.5px;font-family:var(--sans);font-weight:600;
    cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.35);white-space:nowrap;
  }

  /* Library list */
  .word-list{border-top:1px solid rgba(255,255,255,0.08);}
  .word-row{
    display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .word-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;object-position:center;background:var(--bg-3);flex-shrink:0;}
  .word-thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:16px;}
  .word-main{flex:1;min-width:0;}
  .word-term{font-family:var(--serif);font-size:15.5px;color:var(--text);}
  .word-term .sep{color:var(--text-muted);margin:0 6px;font-family:var(--sans);}
  .word-translation{color:var(--accent);font-weight:600;}
  .word-example{font-size:12px;color:var(--text-muted);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .word-box{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);white-space:nowrap;}
  .word-actions{display:flex;gap:4px;}
  .icon-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px;}
  .icon-btn:hover{color:var(--text);background:rgba(255,255,255,0.08);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
  .empty-state .big-emoji{font-size:38px;margin-bottom:10px;}
  .empty-state p{font-family:var(--serif);font-size:15px;max-width:340px;margin:0 auto 16px;}

  /* Forms */
  label.field-label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:5px;margin-top:12px;}
  input[type=text],input[type=search],textarea,select{
    width:100%;background:var(--bg-3);border:1px solid rgba(255,255,255,0.12);border-radius:4px;
    color:var(--text);font-family:var(--sans);font-size:16px;padding:10px 10px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:70px;font-family:var(--mono);font-size:12.5px;}
  .form-row{display:flex;gap:10px;}
  .form-row > *{flex:1;}
  .emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .emoji-opt{font-size:18px;background:var(--bg-3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:5px 8px;cursor:pointer;}
  .emoji-opt.sel{border-color:var(--accent);background:rgba(217,164,65,0.15);}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,15,12,0.72);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50;}
  .modal{background:var(--bg-2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:22px;width:100%;max-width:480px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .modal-title{font-family:var(--serif);font-size:19px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  .hint{font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.5;}

  /* Practice picker */
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.mode-grid{grid-template-columns:1fr;}}
  .direction-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .dir-btn{flex:1;padding:11px 8px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.12);
    background:var(--bg-2);color:var(--text-muted);font-family:var(--mono);font-size:12px;cursor:pointer;text-align:center;}
  .dir-btn.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700;}
  .combo-label{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;
    letter-spacing:1px;margin-bottom:8px;text-align:center;width:100%;}
  .mode-card{
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:16px;cursor:pointer;
    transition:border-color .15s, transform .1s;
  }
  .mode-card:hover{border-color:var(--accent);transform:translateY(-1px);}
  .mode-card .m-emoji{font-size:22px;}
  .mode-card .m-title{font-family:var(--serif);font-size:16px;font-weight:700;margin:8px 0 3px;}
  .mode-card .m-desc{font-size:12.5px;color:var(--text-muted);line-height:1.45;}
  .mode-card[disabled]{opacity:0.4;pointer-events:none;}

  /* Flashcard */
  .session-wrap{display:flex;flex-direction:column;align-items:center;}
  .session-top{width:100%;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:16px;}
  .progress-track{flex:1;height:4px;background:var(--bg-3);border-radius:2px;margin:0 12px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);transition:width .25s;}

  .card-stack{position:relative;width:100%;max-width:380px;margin:0 auto 18px;min-height:380px;}
  .ghost-card{position:absolute;left:0;right:0;top:0;height:100%;background:var(--card-2);border-radius:14px;}
  .ghost-card.g1{transform:scale(0.96) translateY(10px);opacity:0.65;z-index:1;}
  .ghost-card.g2{transform:scale(0.92) translateY(20px);opacity:0.35;z-index:0;}
  .flashcard{
    position:relative;z-index:2;width:100%;min-height:380px;background:var(--card);color:var(--ink);
    border-radius:14px;border-left:6px solid var(--accent);
    box-shadow:0 14px 34px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.05);
    padding:28px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    touch-action:pan-y;cursor:grab;user-select:none;transition:transform .35s cubic-bezier(.2,.7,.3,1);
  }
  .flashcard.dragging{transition:none;cursor:grabbing;}
  .stamp{position:absolute;top:22px;padding:7px 16px;border:3px solid;border-radius:8px;font-weight:800;font-size:15px;
    letter-spacing:1px;text-transform:uppercase;opacity:0;pointer-events:none;font-family:var(--sans);}
  .stamp-yes{right:18px;color:#4FAE7C;border-color:#4FAE7C;transform:rotate(12deg);}
  .stamp-no{left:18px;color:var(--danger);border-color:var(--danger);transform:rotate(-12deg);}
  .fc-img{width:112px;height:112px;border-radius:50%;object-fit:cover;margin-bottom:16px;box-shadow:0 6px 16px rgba(0,0,0,0.25);}
  .fc-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:46px;background:var(--card-2);}
  .fc-term-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .fc-term{font-family:var(--serif);font-size:26px;font-weight:700;}
  .fc-translation{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--teal);margin-top:8px;}
  .fc-divider{width:70%;height:1px;background:rgba(0,0,0,0.12);margin:16px 0;}
  .fc-example-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;font-style:italic;color:var(--ink-soft);max-width:92%;}
  .speak-inline{background:none;border:none;font-size:17px;cursor:pointer;color:var(--ink-soft);flex-shrink:0;}
  .hint-tap{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:14px;text-align:center;}

  /* Quiz */
  .quiz-term{font-family:var(--serif);font-size:26px;text-align:center;margin:20px 0 26px;}
  .quiz-options{display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto;width:100%;}
  .opt-btn{
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.12);color:var(--text);text-align:left;
    padding:13px 14px;border-radius:var(--radius);font-size:15px;cursor:pointer;
  }
  .opt-btn:hover{border-color:var(--accent);}
  .opt-btn.correct{background:rgba(78,148,130,0.25);border-color:var(--teal);}
  .opt-btn.wrong{background:rgba(193,85,77,0.22);border-color:var(--danger);}
  .opt-btn[disabled]{pointer-events:none;}

  /* Typing */
  .type-wrap{max-width:420px;margin:0 auto;width:100%;text-align:center;}
  .type-input{font-size:18px;text-align:center;padding:12px;}
  .type-feedback{margin-top:12px;font-family:var(--mono);font-size:13px;}
  .type-feedback.ok{color:#9FE0CD;}
  .type-feedback.bad{color:#F0A79F;}

  /* Match */
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:480px;margin:0 auto;width:100%;}
  .match-card{
    background:var(--bg-2);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:12px 10px;
    font-size:13.5px;text-align:center;cursor:pointer;min-height:52px;display:flex;align-items:center;justify-content:center;
  }
  .match-card.sel{border-color:var(--accent);background:rgba(217,164,65,0.15);}
  .match-card.done{border-color:var(--teal);background:rgba(78,148,130,0.15);opacity:0.5;pointer-events:none;}
  .match-card.wrong-flash{border-color:var(--danger);background:rgba(193,85,77,0.2);}

  .session-end{text-align:center;padding:30px 10px;}
  .session-end .big-emoji{font-size:44px;}
  .session-end h3{font-family:var(--serif);font-size:22px;margin:10px 0 4px;}
  .session-end p{color:var(--text-muted);font-size:14px;}
  .end-stats{display:flex;gap:20px;justify-content:center;margin:18px 0;font-family:var(--mono);}
  .end-stat b{font-size:22px;display:block;color:var(--accent);}
  .end-stat span{font-size:11px;color:var(--text-muted);text-transform:uppercase;}

  /* Stats view */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .stat-box{background:var(--bg-2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:14px;text-align:center;}
  .stat-box b{display:block;font-family:var(--serif);font-size:24px;color:var(--accent);}
  .stat-box span{font-size:11px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;}

  .hero-panel{text-align:center;padding:26px 16px;}
  .hero-ring{width:136px;height:136px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
  .hero-ring-inner{width:108px;height:108px;border-radius:50%;background:var(--bg-2);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .hero-ring-inner b{font-family:var(--serif);font-size:28px;color:var(--accent);line-height:1;}
  .hero-ring-inner span{font-family:var(--mono);font-size:9.5px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;}
  .hero-caption{font-size:14px;color:var(--text);margin-top:2px;}
  .hero-caption b{color:var(--accent);}

  .seg-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--bg-3);margin:6px 0 12px;}
  .seg-bar .seg{height:100%;transition:width .3s;}
  .seg-fresh{background:var(--ink-soft);}
  .seg-learning{background:var(--accent);}
  .seg-learned{background:var(--teal);}
  .seg-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--text-muted);}
  .seg-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}

  .group-stat-row{padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .group-stat-row:last-child{border-bottom:none;}
  .group-stat-top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;}
  .group-stat-top .gname{display:flex;align-items:center;gap:6px;}
  .group-stat-top .gnum{color:var(--text-muted);font-family:var(--mono);font-size:12px;}
  .group-stat-bar{height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden;}
  .group-stat-fill{height:100%;background:var(--teal);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-ink);
    padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,0.4);}

  /* Auth screen */
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{background:var(--bg-2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:30px 26px;max-width:380px;width:100%;text-align:center;}
  .auth-brand{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:8px;}
  .auth-brand span{color:var(--accent);}
  .auth-card p{color:var(--text-muted);font-size:13.5px;line-height:1.55;margin:6px 0 18px;}
  .auth-msg{font-size:13px;margin-top:14px;line-height:1.5;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}

  /* Mobile optimization */
  @media (max-width:480px){
    #root{padding:12px 10px 92px;}
    .app-header{flex-wrap:wrap;gap:8px;}
    .brand-title{font-size:23px;}
    .brand-sub{font-size:9.5px;letter-spacing:1px;}
    .streak-badge{font-size:11px;padding:5px 8px;}
    .nav-btn{font-size:10px;}
    .nav-btn .nav-icon{font-size:22px;}
    .group-row{gap:6px;}
    .group-chip{font-size:12px;padding:9px 13px;}
    .btn{min-height:46px;font-size:15px;}
    .modal-backdrop{padding:0;align-items:stretch;}
    .modal{max-width:100%;border-radius:0;min-height:100vh;padding:18px 16px 28px;}
    .modal-title{font-size:17px;}
    .form-row{flex-direction:column;gap:0;}
    .word-row{flex-wrap:wrap;row-gap:4px;}
    .word-box{order:5;width:100%;padding-left:50px;margin-top:-2px;}
    .word-term{font-size:14.5px;}

    /* Training screens — bigger everything */
    .practice-group-select{font-size:16px;padding:13px 10px;}
    .mode-grid{gap:10px;}
    .mode-card{padding:18px 16px;}
    .mode-card .m-emoji{font-size:30px;}
    .mode-card .m-title{font-size:18px;margin:10px 0 5px;}
    .mode-card .m-desc{font-size:13.5px;line-height:1.5;}
    .session-top{font-size:13px;margin-bottom:20px;}
    .progress-track{height:6px;}
    .quiz-term{font-size:26px;margin:24px 0 30px;}
    .opt-btn{padding:18px 16px;font-size:16.5px;}
    .type-input{font-size:22px;padding:16px;}
    .type-feedback{font-size:14.5px;}

</head>
<body>
<div id="root"></div>

<script>
(function(){
  "use strict";

  /* ---------------- Supabase ---------------- */
  const SUPABASE_URL = 'https://uczpzpdawnarzbfavjtr.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gihTh-0CFWUXVR3bC_TziQ_QtAw4MkI';
  let supaClient = null;
  let session = null;

  const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
  const DAY = 86400000;
  const BOX_INTERVALS = [0,1,2,4,7,14,30]; // days, index = box level

  const LANGS = [
    {code:'en',name:'Английский'},{code:'de',name:'Немецкий'},{code:'es',name:'Испанский'},
    {code:'fr',name:'Французский'},{code:'it',name:'Итальянский'},{code:'pt',name:'Португальский'},
    {code:'tr',name:'Турецкий'},{code:'nl',name:'Нидерландский'},{code:'pl',name:'Польский'},
    {code:'sv',name:'Шведский'},{code:'zh',name:'Китайский'},{code:'ja',name:'Японский'},
    {code:'ko',name:'Корейский'},{code:'ru',name:'Русский'},{code:'et',name:'Эстонский'},{code:'other',name:'Другой'}
  ];
  const EMOJIS = ['📘','🍎','🧭','🌿','🧠','☕','🚀','🏔️','🎯','🛠️','🐝','🎲','🧳','🔥','🌊','⚙️'];

  /* ---------------- app state ---------------- */
  let state = {
    groups: [],   // {id,name,emoji,lang}
    words: [],    // {id,groupId,term,translation,example,image,box,nextReview,correct,wrong,createdAt}
    stats: {streak:0,lastDate:null,totalReviews:0},
    view: 'library',
    activeGroup: 'all',
    modal: null
  };

  /* ---------------- DB <-> app object mapping ---------------- */
  function dbToGroup(r){
    return {id:r.id, name:r.name, emoji:r.emoji, lang:r.lang, createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()};
  }
  function dbToWord(r){
    return {
      id:r.id, groupId:r.group_id, term:r.term, translation:r.translation,
      example:r.example||'', image:r.image||null, box:r.box||0,
      nextReview: r.next_review ? new Date(r.next_review).getTime() : Date.now(),
      correct:r.correct||0, wrong:r.wrong||0,
      createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()
    };
  }

  async function loadAll(){
    const [groupsRes, wordsRes, statsRes] = await Promise.all([
      supaClient.from('groups').select('*').order('created_at', {ascending:true}),
      supaClient.from('words').select('*').order('created_at', {ascending:false}),
      supaClient.from('user_stats').select('*').maybeSingle()
    ]);
    if(groupsRes.error) console.error(groupsRes.error);
    if(wordsRes.error) console.error(wordsRes.error);
    state.groups = (groupsRes.data||[]).map(dbToGroup);
    state.words = (wordsRes.data||[]).map(dbToWord);
    const sr = statsRes.data;
    state.stats = sr ? {streak:sr.streak||0, lastDate:sr.last_date||null, totalReviews:sr.total_reviews||0} : {streak:0,lastDate:null,totalReviews:0};

    if(state.groups.length === 0 && state.words.length === 0){
      // seed a starter group so the app isn't empty on first run
      const g = {id:uid(), name:'Мои слова', emoji:'📘', lang:'en'};
      await insertGroupRow(g);
      state.groups.push(g);
    }
  }

  async function insertGroupRow(g){
    const {error} = await supaClient.from('groups').insert({id:g.id, name:g.name, emoji:g.emoji, lang:g.lang});
    if(error){ console.error(error); toast('Не удалось сохранить группу'); }
  }

  async function insertWordRow(w){
    const {error} = await supaClient.from('words').insert({
      id:w.id, group_id:w.groupId, term:w.term, translation:w.translation, example:w.example,
      image:w.image, box:w.box, next_review:new Date(w.nextReview).toISOString(), correct:w.correct, wrong:w.wrong
    });
    if(error){ console.error(error); toast('Не удалось сохранить слово'); }
  }

  async function insertWordsRows(words){
    const rows = words.map(w=>({
      id:w.id, group_id:w.groupId, term:w.term, translation:w.translation, example:w.example,
      image:w.image, box:w.box, next_review:new Date(w.nextReview).toISOString(), correct:w.correct, wrong:w.wrong
    }));
    const {error} = await supaClient.from('words').insert(rows);
    if(error){ console.error(error); toast('Не удалось импортировать часть слов'); }
  }

  function updateWordImageRow(id, image){
    supaClient.from('words').update({image}).eq('id', id).then(({error})=>{ if(error) console.error(error); });
  }

  async function deleteWordRow(id){
    const {error} = await supaClient.from('words').delete().eq('id', id);
    if(error){ console.error(error); toast('Не удалось удалить слово'); }
  }

  function updateWordProgressRow(w){
    supaClient.from('words').update({
      box:w.box, next_review:new Date(w.nextReview).toISOString(), correct:w.correct, wrong:w.wrong
    }).eq('id', w.id).then(({error})=>{ if(error) console.error(error); });
  }

  function upsertStatsRow(){
    if(!session) return;
    supaClient.from('user_stats').upsert({
      user_id: session.user.id, streak: state.stats.streak, last_date: state.stats.lastDate, total_reviews: state.stats.totalReviews
    }).then(({error})=>{ if(error) console.error(error); });
  }

  function touchStreak(){
    const today = new Date().toDateString();
    if(state.stats.lastDate === today) return;
    const y = new Date(Date.now()-DAY).toDateString();
    state.stats.streak = (state.stats.lastDate === y) ? state.stats.streak + 1 : 1;
    state.stats.lastDate = today;
    upsertStatsRow();
  }

  /* ---------------- image + speech ---------------- */
  async function fetchImage(term, lang){
    try{
      const l = (lang && lang!=='other') ? lang : 'en';
      const url = `https://${l}.wikipedia.org/w/api.php?origin=*&action=query&prop=pageimages&format=json&piprop=thumbnail&pithumbsize=200&generator=search&gsrsearch=${encodeURIComponent(term)}&gsrlimit=1`;
      const res = await fetch(url);
      const data = await res.json();
      const pages = data && data.query && data.query.pages;
      if(pages){
        const first = Object.values(pages)[0];
        if(first && first.thumbnail && first.thumbnail.source) return first.thumbnail.source;
      }
    }catch(e){ /* silent — image is a nice-to-have */ }
    return null;
  }
  function speak(text, lang){
    try{
      if(!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = (lang && lang!=='other') ? lang : 'en';
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(e){}
  }

  /* ---------------- derived helpers ---------------- */
  function groupById(id){ return state.groups.find(g=>g.id===id); }
  function wordsIn(groupId){
    return groupId==='all' ? state.words.slice() : state.words.filter(w=>w.groupId===groupId);
  }
  function dueWords(list){
    const now = Date.now();
    return list.filter(w => !w.nextReview || w.nextReview <= now);
  }
  function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ---------------- render root ---------------- */
  const root = document.getElementById('root');

  function render(){
    root.innerHTML = `
      <div class="app-header">
        <div class="brand">
          <div class="brand-title">Карто<span>тека</span></div>
          <div class="brand-sub">личный архив слов</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="streak-badge">🔥 ${state.stats.streak} ${dayWord(state.stats.streak)} подряд</div>
          <button class="icon-btn" id="logout-btn" title="Выйти из аккаунта">⎋</button>
        </div>
      </div>
      <div id="view-slot"></div>
      <div id="modal-slot"></div>
      <div id="toast-slot"></div>
      ${state.view==='library' ? fabHtml() : ''}
      <div class="bottom-nav"><div class="bottom-nav-inner">
        ${navBtn('library','📖','Библиотека')}
        ${navBtn('practice','🎯','Тренировка')}
        ${navBtn('stats','📊','Статистика')}
      </div></div>
    `;
    bindHeader();
    renderView();
    renderModal();
    bindBottomNav();
    bindFab();
  }
  function fabHtml(){
    return `
      ${state.fabOpen ? `
        <div class="fab-backdrop" data-fab-close="1"></div>
        <div class="fab-menu">
          <button class="fab-menu-item" data-fab-add-word="1">✏️ Добавить слово</button>
          <button class="fab-menu-item" data-fab-bulk="1">📥 Импорт из файла</button>
        </div>` : ''}
      <button class="fab" id="fab-btn">${state.fabOpen ? '✕' : '+'}</button>
    `;
  }
  function bindFab(){
    const fabBtn = root.querySelector('#fab-btn');
    if(fabBtn) fabBtn.onclick = ()=>{ state.fabOpen = !state.fabOpen; render(); };
    const bg = root.querySelector('[data-fab-close]');
    if(bg) bg.onclick = ()=>{ state.fabOpen = false; render(); };
    const addW = root.querySelector('[data-fab-add-word]');
    if(addW) addW.onclick = ()=>{ state.fabOpen = false; openWordModal(); };
    const bulk = root.querySelector('[data-fab-bulk]');
    if(bulk) bulk.onclick = ()=>{ state.fabOpen = false; openBulkModal(); };
  }
  function navBtn(id,icon,label){
    return `<button class="nav-btn ${state.view===id?'active':''}" data-tab="${id}">
      <span class="nav-icon">${icon}</span><span>${label}</span>
    </button>`;
  }
  function bindBottomNav(){
    root.querySelectorAll('.nav-btn').forEach(b=>{
      b.onclick = () => { state.view = b.dataset.tab; state.session=null; render(); };
    });
  }
  function dayWord(n){
    n = Math.abs(n)%100;
    const n1 = n%10;
    if(n>10 && n<20) return 'дней';
    if(n1===1) return 'день';
    if(n1>=2 && n1<=4) return 'дня';
    return 'дней';
  }
  function bindHeader(){
    const lo = root.querySelector('#logout-btn');
    if(lo) lo.onclick = async ()=>{ await supaClient.auth.signOut(); };
  }

  function renderView(){
    const slot = document.getElementById('view-slot');
    if(state.view==='library') slot.innerHTML = libraryView();
    else if(state.view==='practice') slot.innerHTML = state.session ? sessionView() : practiceView();
    else if(state.view==='stats') slot.innerHTML = statsView();
    bindView();
  }

  /* ================= LIBRARY ================= */
  function libraryView(){
    const groups = state.groups;
    const chips = [`<div class="group-chip ${state.activeGroup==='all'?'active':''}" data-g="all">Все <span class="count">${state.words.length}</span></div>`]
      .concat(groups.map(g=>{
        const n = wordsIn(g.id).length;
        return `<div class="group-chip ${state.activeGroup===g.id?'active':''}" data-g="${g.id}">${g.emoji} ${esc(g.name)} <span class="count">${n}</span></div>`;
      }))
      .concat([`<div class="group-chip add" data-newgroup="1">+ группа</div>`])
      .join('');

    const list = wordsIn(state.activeGroup).slice().sort((a,b)=>b.createdAt-a.createdAt);
    const rows = list.length ? list.map(wordRow).join('') : `
      <div class="empty-state">
        <div class="big-emoji">🗂️</div>
        <p>Пока здесь пусто. Добавь слово вручную или загрузи готовый список файлом — картотека заполнится сама.</p>
      </div>`;

    return `
      <div class="group-row">${chips}</div>
      <div class="word-list">${rows}</div>
    `;
  }
  function wordRow(w){
    const g = groupById(w.groupId);
    const thumb = w.image
      ? `<img class="word-thumb" src="${w.image}" alt="">`
      : `<div class="word-thumb placeholder">${g?g.emoji:'📘'}</div>`;
    return `
      <div class="word-row" data-word="${w.id}">
        ${thumb}
        <div class="word-main">
          <div class="word-term">${esc(w.term)}<span class="sep">—</span><span class="word-translation">${esc(w.translation)}</span></div>
          ${w.example?`<div class="word-example">${esc(w.example)}</div>`:''}
        </div>
        <div class="word-box">box ${w.box||0}</div>
        <div class="word-actions">
          <button class="icon-btn" data-speak="${w.id}" title="Произнести">🔊</button>
          <button class="icon-btn" data-del="${w.id}" title="Удалить">✕</button>
        </div>
      </div>`;
  }

  function bindView(){
    if(state.view==='library'){
      root.querySelectorAll('.group-chip[data-g]').forEach(c=>{
        c.onclick = () => { state.activeGroup = c.dataset.g; renderView(); };
      });
      const addG = root.querySelector('[data-newgroup]');
      if(addG) addG.onclick = () => openGroupModal();
      root.querySelectorAll('[data-del]').forEach(b=>{
        b.onclick = (e)=>{ e.stopPropagation(); deleteWord(b.dataset.del); };
      });
      root.querySelectorAll('[data-speak]').forEach(b=>{
        b.onclick = (e)=>{ e.stopPropagation();
          const w = state.words.find(x=>x.id===b.dataset.speak);
          const g = w && groupById(w.groupId);
          if(w) speak(w.term, g && g.lang);
        };
      });
    } else if(state.view==='practice' && !state.session){
      root.querySelectorAll('[data-mode]').forEach(c=>{
        c.onclick = () => startSession(c.dataset.mode, c.dataset.group);
      });
      const gsel = root.querySelector('#practice-group');
      if(gsel) gsel.onchange = () => { state.practiceGroup = gsel.value; renderView(); };
      root.querySelectorAll('[data-dir]').forEach(b=>{
        b.onclick = () => { state.practiceDirection = b.dataset.dir; renderView(); };
      });
    } else if(state.view==='practice' && state.session){
      bindSession();
    } else if(state.view==='stats'){
      // static
    }
  }

  function deleteWord(id){
    state.words = state.words.filter(w=>w.id!==id);
    renderView();
    deleteWordRow(id);
  }

  /* ================= MODALS: group / word / bulk ================= */
  function openGroupModal(){ state.modal = {type:'group', emoji:EMOJIS[0], lang:'en'}; renderModal(); }
  function openWordModal(){
    if(state.groups.length===0){ openGroupModal(); return; }
    const gid = state.activeGroup!=='all' ? state.activeGroup : state.groups[0].id;
    state.modal = {type:'word', groupId:gid};
    renderModal();
  }
  function openBulkModal(){
    const gid = state.activeGroup!=='all' ? state.activeGroup : (state.groups[0] && state.groups[0].id);
    state.modal = {type:'bulk', groupId:gid, text:''};
    renderModal();
  }
  function closeModal(){ state.modal=null; renderModal(); }

  function renderModal(){
    const slot = document.getElementById('modal-slot');
    if(!slot) return;
    if(!state.modal){ slot.innerHTML=''; return; }
    if(state.modal.type==='group') slot.innerHTML = groupModalHtml();
    else if(state.modal.type==='word') slot.innerHTML = wordModalHtml();
    else if(state.modal.type==='bulk') slot.innerHTML = bulkModalHtml();
    bindModal();
  }

  function groupModalHtml(){
    const m = state.modal;
    return `
    <div class="modal-backdrop" data-close-bg="1">
      <div class="modal">
        <div class="modal-head"><div class="modal-title">Новая группа</div><button class="modal-close" data-close="1">✕</button></div>
        <label class="field-label">Название</label>
        <input type="text" id="g-name" placeholder="Например: Кухня, Бизнес-лексика, B2B письма">
        <label class="field-label">Язык слов (для звука и картинок)</label>
        <select id="g-lang">${LANGS.map(l=>`<option value="${l.code}" ${l.code===m.lang?'selected':''}>${l.name}</option>`).join('')}</select>
        <label class="field-label">Значок</label>
        <div class="emoji-picker">${EMOJIS.map(e=>`<div class="emoji-opt ${e===m.emoji?'sel':''}" data-emoji="${e}">${e}</div>`).join('')}</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-close="1">Отмена</button>
          <button class="btn btn-accent" id="g-save">Создать</button>
        </div>
      </div>
    </div>`;
  }

  function wordModalHtml(){
    const m = state.modal;
    return `
    <div class="modal-backdrop" data-close-bg="1">
      <div class="modal">
        <div class="modal-head"><div class="modal-title">Новое слово</div><button class="modal-close" data-close="1">✕</button></div>
        <label class="field-label">Группа</label>
        <select id="w-group">${state.groups.map(g=>`<option value="${g.id}" ${g.id===m.groupId?'selected':''}>${g.emoji} ${esc(g.name)}</option>`).join('')}</select>
        <div class="form-row">
          <div>
            <label class="field-label">Слово</label>
            <input type="text" id="w-term" placeholder="apple">
          </div>
          <div>
            <label class="field-label">Перевод</label>
            <input type="text" id="w-translation" placeholder="яблоко">
          </div>
        </div>
        <label class="field-label">Пример (необязательно)</label>
        <textarea id="w-example" placeholder="I eat an apple every morning."></textarea>
        <div class="hint">🖼️ Картинка подгрузится автоматически по слову.</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-close="1">Отмена</button>
          <button class="btn btn-accent" id="w-save">Добавить</button>
        </div>
      </div>
    </div>`;
  }

  function bulkModalHtml(){
    const m = state.modal;
    if(state.groups.length===0){
      return `<div class="modal-backdrop" data-close-bg="1"><div class="modal">
        <div class="modal-head"><div class="modal-title">Сначала создай группу</div><button class="modal-close" data-close="1">✕</button></div>
        <p class="hint">Чтобы импортировать слова, нужна хотя бы одна группа.</p>
        <div class="modal-actions"><button class="btn btn-accent" id="bulk-mk-group">Создать группу</button></div>
      </div></div>`;
    }
    return `
    <div class="modal-backdrop" data-close-bg="1">
      <div class="modal">
        <div class="modal-head"><div class="modal-title">Импорт списка слов</div><button class="modal-close" data-close="1">✕</button></div>
        <label class="field-label">В группу</label>
        <select id="b-group">${state.groups.map(g=>`<option value="${g.id}" ${g.id===m.groupId?'selected':''}>${g.emoji} ${esc(g.name)}</option>`).join('')}</select>
        <label class="field-label">Файл (.xlsx, .xls, .csv, .txt)</label>
        <input type="file" id="b-file" accept=".csv,.txt,.tsv,.xlsx,.xls">
        <label class="field-label">Или вставь таблицу вручную</label>
        <textarea id="b-text" placeholder="apple	яблоко	I eat an apple
book	книга	This is my book" style="min-height:120px;">${esc(m.text||'')}</textarea>
        <div class="hint">Формат в каждой строке: <b>слово</b>, <b>перевод</b>, необязательно <b>пример</b>. Загрузи готовый файл <b>.xlsx / .xls</b> — колонки подхватятся автоматически из первого листа. Так же можно вставить строки прямо из Excel/Google Sheets или .csv.</div>
        <div id="b-preview" class="hint"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-close="1">Отмена</button>
          <button class="btn btn-accent" id="b-save">Импортировать</button>
        </div>
      </div>
    </div>`;
  }

  function parseBulkText(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const rows = [];
    for(const line of lines){
      let parts;
      if(line.includes('\t')) parts = line.split('\t');
      else if(line.includes(';')) parts = line.split(';');
      else parts = line.split(',');
      parts = parts.map(p=>p.trim());
      if(parts.length>=2 && parts[0] && parts[1]){
        rows.push({term:parts[0], translation:parts[1], example:parts[2]||''});
      }
    }
    return rows;
  }

  function bindModal(){
    const m = state.modal;
    if(!m) return;
    root.querySelectorAll('[data-close]').forEach(b=>b.onclick = closeModal);
    const bg = root.querySelector('[data-close-bg]');
    if(bg) bg.onclick = (e)=>{ if(e.target===bg) closeModal(); };

    if(m.type==='group'){
      root.querySelectorAll('[data-emoji]').forEach(e=>{
        e.onclick = ()=>{ state.modal.emoji = e.dataset.emoji; renderModal(); };
      });
      const langSel = root.querySelector('#g-lang');
      if(langSel) langSel.onchange = ()=>{ state.modal.lang = langSel.value; };
      root.querySelector('#g-save').onclick = ()=>{
        const name = root.querySelector('#g-name').value.trim();
        if(!name){ toast('Введи название группы'); return; }
        const g = {id:uid(), name, emoji:state.modal.emoji, lang:root.querySelector('#g-lang').value};
        state.groups.push(g);
        state.activeGroup = g.id;
        closeModal();
        renderView();
        insertGroupRow(g);
      };
    }

    if(m.type==='word'){
      root.querySelector('#w-save').onclick = async ()=>{
        const groupId = root.querySelector('#w-group').value;
        const term = root.querySelector('#w-term').value.trim();
        const translation = root.querySelector('#w-translation').value.trim();
        const example = root.querySelector('#w-example').value.trim();
        if(!term || !translation){ toast('Заполни слово и перевод'); return; }
        const w = {id:uid(), groupId, term, translation, example, image:null, box:0, nextReview:Date.now(), correct:0, wrong:0, createdAt:Date.now()};
        state.words.push(w);
        closeModal();
        renderView();
        await insertWordRow(w);
        const g = groupById(groupId);
        const img = await fetchImage(term, g && g.lang);
        if(img){
          const found = state.words.find(x=>x.id===w.id);
          if(found){ found.image = img; updateWordImageRow(w.id, img); if(state.view==='library') renderView(); }
        }
      };
    }

    if(m.type==='bulk'){
      const mk = root.querySelector('#bulk-mk-group');
      if(mk){ mk.onclick = ()=>{ openGroupModal(); }; return; }
      const fileInput = root.querySelector('#b-file');
      const textArea = root.querySelector('#b-text');
      const preview = root.querySelector('#b-preview');
      function updatePreview(){
        const rows = parseBulkText(textArea.value);
        preview.textContent = rows.length ? `Найдено строк: ${rows.length}` : '';
      }
      textArea.oninput = updatePreview;
      updatePreview();
      if(fileInput){
        fileInput.onchange = ()=>{
          const f = fileInput.files[0];
          if(!f) return;
          const name = f.name.toLowerCase();
          const isExcel = name.endsWith('.xlsx') || name.endsWith('.xls');
          if(isExcel){
            if(typeof XLSX === 'undefined'){ toast('Не удалось загрузить модуль для Excel. Попробуй сохранить файл как .csv'); return; }
            const reader = new FileReader();
            reader.onload = (e)=>{
              try{
                const wb = XLSX.read(e.target.result, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:''});
                const lines = rows
                  .map(r => (r||[]).map(c=>String(c==null?'':c).trim()))
                  .filter(r => r.length>=2 && r[0] && r[1])
                  .map(r => r.slice(0,3).join('\t'));
                textArea.value = lines.join('\n');
                updatePreview();
                if(lines.length===0) toast('В файле не нашлось строк вида слово / перевод');
              }catch(err){
                toast('Не получилось прочитать этот Excel-файл');
              }
            };
            reader.readAsArrayBuffer(f);
          } else {
            const reader = new FileReader();
            reader.onload = ()=>{ textArea.value = reader.result; updatePreview(); };
            reader.readAsText(f);
          }
        };
      }
      root.querySelector('#b-save').onclick = async ()=>{
        const groupId = root.querySelector('#b-group').value;
        const rows = parseBulkText(textArea.value);
        if(rows.length===0){ toast('Не удалось распознать ни одной строки'); return; }
        const newWords = rows.map(r=>({
          id:uid(), groupId, term:r.term, translation:r.translation, example:r.example||'',
          image:null, box:0, nextReview:Date.now(), correct:0, wrong:0, createdAt:Date.now()
        }));
        state.words = state.words.concat(newWords);
        closeModal();
        renderView();
        toast(`Импортировано слов: ${newWords.length}`);
        await insertWordsRows(newWords);
        const g = groupById(groupId);
        Promise.all(newWords.map(w => fetchImage(w.term, g && g.lang).then(img => ({id:w.id, img}))))
          .then(results=>{
            let changed = false;
            results.forEach(r=>{
              if(!r.img) return;
              const found = state.words.find(x=>x.id===r.id);
              if(found){ found.image = r.img; changed = true; updateWordImageRow(r.id, r.img); }
            });
            if(changed && state.view==='library') renderView();
          });
      };
    }
  }

  function toast(msg){
    const slot = document.getElementById('toast-slot');
    if(!slot) return;
    slot.innerHTML = `<div class="toast">${esc(msg)}</div>`;
    setTimeout(()=>{ if(slot) slot.innerHTML=''; }, 2600);
  }

  /* ================= PRACTICE PICKER ================= */
  function practiceView(){

  /* ================= SESSION ENGINE ================= */
  function startSession(mode, groupId){
    if(mode==='combo'){
      let pool = wordsIn(groupId);
      if(pool.length<4){ toast('Для комбо-тренировки нужно минимум 4 слова'); return; }
      let due = dueWords(pool);
      const basePool = (due.length>=Math.min(5,pool.length)) ? due : pool.slice();
      state.combo = { pool: basePool, groupId, stages:['flash','quiz','type','match'], stageIndex:0, aggCorrect:0, aggWrong:0 };
      launchComboStage();
      return;
    }
    let pool = wordsIn(groupId);
    if(pool.length===0){ toast('В этой группе пока нет слов'); return; }
    let due = dueWords(pool);
    let queue = (due.length>=Math.min(5,pool.length)) ? due : pool.slice();
    // shuffle
    queue = queue.slice().sort(()=>Math.random()-0.5);
    if(mode!=='match') queue = queue.slice(0, Math.min(15, queue.length));

    state.session = {
      mode, groupId, queue, idx:0,
      correct:0, wrong:0, flipped:false,
      direction: state.practiceDirection || 'normal',
      matchState: mode==='match' ? buildMatchState(queue.slice(0,6)) : null,
      finished:false
    };
    renderView();
  }

  function launchComboStage(){
    const c = state.combo;
    const stageMode = c.stages[c.stageIndex];
    let queue = c.pool.slice().sort(()=>Math.random()-0.5);
    if(stageMode!=='match') queue = queue.slice(0, Math.min(15, queue.length));
    state.session = {
      mode: stageMode, groupId: c.groupId, queue, idx:0,
      correct:0, wrong:0, flipped:false,
      direction: state.practiceDirection || 'normal',
      matchState: stageMode==='match' ? buildMatchState(queue.slice(0,6)) : null,
      finished:false
    };
    renderView();
  }

  function finishSession(){
    const s = state.session;
    if(state.combo){
      const c = state.combo;
      c.aggCorrect += s.mode==='match' ? s.matchState.pairs.length : s.correct;
      c.aggWrong += s.mode==='match' ? 0 : s.wrong;
      c.stageIndex++;
      if(c.stageIndex < c.stages.length){
        launchComboStage();
        return;
      }
      state.session = { mode:'combo-end', groupId:c.groupId, correct:c.aggCorrect, wrong:c.aggWrong };
      state.combo = null;
      renderView();
      return;
    }
    renderView();
  }

  function promptText(w, s){ return (s && s.direction==='reverse') ? w.translation : w.term; }
  function answerText(w, s){ return (s && s.direction==='reverse') ? w.term : w.translation; }
  function promptLang(w, s, g){ return (s && s.direction==='reverse') ? 'ru' : (g && g.lang); }
  function stageName(m){ return ({flash:'Флеш-карточки', quiz:'Тест', type:'Ввод перевода', match:'Найди пару'})[m] || ''; }

  function currentWord(){ const s=state.session; return s.queue[s.idx]; }

  function gradeWord(w, ok){
    if(ok){
      w.box = Math.min((w.box||0)+1, 6);
      w.correct = (w.correct||0)+1;
    } else {
      w.box = 0;
      w.wrong = (w.wrong||0)+1;
    }
    w.nextReview = Date.now() + BOX_INTERVALS[w.box]*DAY;
    updateWordProgressRow(w);
    state.stats.totalReviews = (state.stats.totalReviews||0)+1;
    touchStreak();
  }

  function advance(ok){
    const s = state.session;
    const w = currentWord();
    if(w) gradeWord(w, ok);
    if(ok) s.correct++; else s.wrong++;
    s.idx++;
    s.flipped = false;
    if(s.idx >= s.queue.length){ s.finished = true; finishSession(); return; }
    renderView();
  }

  function sessionView(){
    const s = state.session;
    if(s.mode==='combo-end') return comboEndHtml();
    if(s.finished) return sessionEndHtml();
    if(s.mode==='flash') return flashHtml();
    if(s.mode==='quiz') return quizHtml();
    if(s.mode==='type') return typeHtml();
    if(s.mode==='match') return matchHtml();
    return '';
  }

  function sessionTopHtml(){
    const s = state.session;
    const total = s.mode==='match' ? (s.matchState.pairs.length) : s.queue.length;
    const done = s.mode==='match' ? s.matchState.solved.length : s.idx;
    const pct = total? Math.round(100*done/total) : 0;
    const comboLabel = state.combo ? `<div class="combo-label">Этап ${state.combo.stageIndex+1}/${state.combo.stages.length} · ${stageName(s.mode)}</div>` : '';
    return `
      ${comboLabel}
      <div class="session-top">
        <span>${done}/${total}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span data-exit="1" style="cursor:pointer;">✕ выйти</span>
      </div>`;
  }

  function flashHtml(){
    const s = state.session;
    const w = currentWord();
    const remaining = s.queue.length - s.idx;
    const imgHtml = w.image
      ? `<img class="fc-img" src="${w.image}">`
      : `<div class="fc-img placeholder">${(groupById(w.groupId)||{}).emoji||'📘'}</div>`;
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="hint-tap">нажми — посмотреть перевод · потяни карточку: вправо — знал, влево — не знал</div>
      <div class="card-stack">
        ${remaining>2?`<div class="ghost-card g2"></div>`:''}
        ${remaining>1?`<div class="ghost-card g1"></div>`:''}
        <div class="flashcard" id="fc">
          <div class="stamp stamp-yes" id="stamp-yes">Знал</div>
          <div class="stamp stamp-no" id="stamp-no">Не знал</div>
          ${imgHtml}
          <div class="fc-term-row">
            <button class="speak-inline" data-speak-fc="1">🔊</button>
            <span class="fc-term">${esc(promptText(w,s))}</span>
          </div>
          ${s.flipped ? `
            <div class="fc-translation">${esc(answerText(w,s))}</div>
            ${w.example ? `
              <div class="fc-divider"></div>
              <div class="fc-example-row">
                <button class="speak-inline" data-speak-ex="1">🔊</button>
                <span>${esc(w.example)}</span>
              </div>` : ''}
          ` : ''}
        </div>
      </div>
    </div>`;
  }

  function quizHtml(){
    const s = state.session;
    const w = currentWord();
    if(!s._opts || s._optsFor!==w.id){
      const others = state.words.filter(x=>x.id!==w.id && x.groupId===w.groupId);
      const pool = others.length>=3 ? others : state.words.filter(x=>x.id!==w.id);
      const distractors = pool.slice().sort(()=>Math.random()-0.5).slice(0,3).map(x=>answerText(x,s));
      const correctAns = answerText(w,s);
      const opts = distractors.concat([correctAns]).sort(()=>Math.random()-0.5);
      s._opts = opts; s._optsFor = w.id; s._answered=false;
    }
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="quiz-term">${esc(promptText(w,s))}</div>
      <div class="quiz-options">
        ${s._opts.map(o=>`<button class="opt-btn" data-answer="${esc(o)}">${esc(o)}</button>`).join('')}
      </div>
    </div>`;
  }

  function typeHtml(){
    const s = state.session;
    const w = currentWord();
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="quiz-term">${esc(promptText(w,s))}</div>
      <div class="type-wrap">
        <input type="text" class="type-input" id="type-in" placeholder="перевод..." autocomplete="off" autofocus>
        <div class="type-feedback" id="type-fb"></div>
        <div style="margin-top:14px;"><button class="btn btn-accent" id="type-check">Проверить</button></div>
      </div>
    </div>`;
  }

  function buildMatchState(words){
    const left = words.map(w=>({key:w.id, side:'term', text:w.term, id:w.id}));
    const right = words.map(w=>({key:w.id, side:'trans', text:w.translation, id:w.id}));
    const cards = left.concat(right).sort(()=>Math.random()-0.5);
    return {cards, pairs:words, solved:[], selected:null};
  }

  function matchHtml(){
    const s = state.session;
    const ms = s.matchState;
    return `
    <div class="session-wrap">
      ${sessionTopHtml()}
      <div class="match-grid">
        ${ms.cards.map((c,i)=>{
          const solved = ms.solved.includes(c.id);
          const sel = ms.selected && ms.selected.i===i;
          return `<div class="match-card ${solved?'done':''} ${sel?'sel':''}" data-mi="${i}">${esc(c.text)}</div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function sessionEndHtml(){
    const s = state.session;
    const total = s.mode==='match' ? s.matchState.pairs.length : (s.correct+s.wrong);
    return `
    <div class="session-end">
      <div class="big-emoji">${s.wrong===0?'🏆':'📚'}</div>
      <h3>Сессия завершена</h3>
      <p>Так держать — карточки не забываются сами.</p>
      <div class="end-stats">
        <div class="end-stat"><b>${s.mode==='match'?total:s.correct}</b><span>${s.mode==='match'?'пар найдено':'верно'}</span></div>
        ${s.mode!=='match'?`<div class="end-stat"><b>${s.wrong}</b><span>не знал</span></div>`:''}
        <div class="end-stat"><b>${state.stats.streak}</b><span>серия дней</span></div>
      </div>
      <button class="btn btn-accent" data-again="1">Ещё раз</button>
      <button class="btn btn-ghost" data-exit="1" style="margin-left:10px;">К режимам</button>
    </div>`;
  }

  function comboEndHtml(){
    const s = state.session;
    return `
    <div class="session-end">
      <div class="big-emoji">🏅</div>
      <h3>Комбо завершено!</h3>
      <p>Ты прошёл все 4 упражнения подряд на одном наборе слов — карточки, тест, ввод и поиск пар.</p>
      <div class="end-stats">
        <div class="end-stat"><b>${s.correct}</b><span>верно всего</span></div>
        <div class="end-stat"><b>${s.wrong}</b><span>не знал</span></div>
        <div class="end-stat"><b>${state.stats.streak}</b><span>серия дней</span></div>
      </div>
      <button class="btn btn-accent" data-again-combo="1">Ещё раз</button>
      <button class="btn btn-ghost" data-exit="1" style="margin-left:10px;">К режимам</button>
    </div>`;
  }

  function bindSession(){
    const s = state.session;
    root.querySelectorAll('[data-exit]').forEach(b=>b.onclick = ()=>{ state.session=null; state.combo=null; renderView(); });
    if(s.mode==='combo-end'){
      const again = root.querySelector('[data-again-combo]');
      if(again) again.onclick = ()=> startSession('combo', s.groupId);
      return;
    }
    if(s.finished){
      const again = root.querySelector('[data-again]');
      if(again) again.onclick = ()=> startSession(s.mode, s.groupId);
      return;
    }
    if(s.mode==='flash'){
      const fc = root.querySelector('#fc');
      const stampYes = root.querySelector('#stamp-yes');
      const stampNo = root.querySelector('#stamp-no');
      const sb = root.querySelector('[data-speak-fc]');
      if(sb) sb.onclick = (e)=>{ e.stopPropagation(); const w=currentWord(); const g=groupById(w.groupId); speak(promptText(w,s), promptLang(w,s,g)); };
      const sbEx = root.querySelector('[data-speak-ex]');
      if(sbEx) sbEx.onclick = (e)=>{ e.stopPropagation(); const w=currentWord(); const g=groupById(w.groupId); speak(w.example, g&&g.lang); };

      if(fc){
        let startX=0, startY=0, dx=0, dragging=false, pointerId=null;
        const THRESHOLD = 90;

        function onDown(e){
          if(e.target.closest('[data-speak-fc]') || e.target.closest('[data-speak-ex]')) return;
          pointerId = e.pointerId;
          startX = e.clientX; startY = e.clientY; dx = 0; dragging = false;
          fc.setPointerCapture(pointerId);
        }
        function onMove(e){
          if(pointerId===null || e.pointerId!==pointerId) return;
          const ddx = e.clientX - startX;
          const ddy = e.clientY - startY;
          if(!dragging && Math.abs(ddx) < 6) return;
          if(!dragging && Math.abs(ddy) > Math.abs(ddx)) return; // vertical scroll intent, ignore
          dragging = true;
          dx = ddx;
          fc.classList.add('dragging');
          fc.style.transform = `translateX(${dx}px) rotate(${dx/18}deg)`;
          const frac = Math.min(Math.abs(dx)/THRESHOLD, 1);
          if(dx>0){ stampYes.style.opacity = frac; stampNo.style.opacity = 0; }
          else { stampNo.style.opacity = frac; stampYes.style.opacity = 0; }
        }
        function onUp(e){
          if(pointerId===null || e.pointerId!==pointerId) return;
          fc.classList.remove('dragging');
          if(dragging && Math.abs(dx) > THRESHOLD){
            const ok = dx > 0;
            const flyX = ok ? window.innerWidth : -window.innerWidth;
            fc.style.transform = `translateX(${flyX}px) rotate(${dx/18}deg)`;
            fc.style.opacity = '0';
            setTimeout(()=> advance(ok), 220);
          } else if(dragging){
            fc.style.transform = '';
            stampYes.style.opacity = 0; stampNo.style.opacity = 0;
          } else {
            s.flipped = !s.flipped; renderView();
          }
          pointerId = null; dragging = false; dx = 0;
        }
        fc.onpointerdown = onDown;
        fc.onpointermove = onMove;
        fc.onpointerup = onUp;
        fc.onpointercancel = onUp;
      }
    }
    if(s.mode==='quiz'){
      root.querySelectorAll('[data-answer]').forEach(b=>{
        b.onclick = ()=>{
          if(s._answered) return;
          s._answered = true;
          const w = currentWord();
          const correctAns = answerText(w,s);
          const ok = b.dataset.answer===correctAns;
          root.querySelectorAll('[data-answer]').forEach(o=>{
            o.setAttribute('disabled','1');
            if(o.dataset.answer===correctAns) o.classList.add('correct');
            else if(o===b) o.classList.add('wrong');
          });
          setTimeout(()=>advance(ok), 700);
        };
      });
    }
    if(s.mode==='type'){
      const input = root.querySelector('#type-in');
      const fb = root.querySelector('#type-fb');
      const check = root.querySelector('#type-check');
      function doCheck(){
        if(check.disabled) return;
        check.disabled = true;
        const w = currentWord();
        const correctAns = answerText(w,s);
        const val = (input.value||'').trim().toLowerCase();
        const ok = val === (correctAns||'').trim().toLowerCase();
        fb.textContent = ok ? '✓ верно!' : `✕ верный ответ: ${correctAns}`;
        fb.className = 'type-feedback ' + (ok?'ok':'bad');
        setTimeout(()=>advance(ok), 900);
      }
      if(check) check.onclick = doCheck;
      if(input){
        input.focus();
        input.onkeydown = (e)=>{ if(e.key==='Enter') doCheck(); };
      }
    }
    if(s.mode==='match'){
      const ms = s.matchState;
      root.querySelectorAll('[data-mi]').forEach(el=>{
        el.onclick = ()=>{
          const i = parseInt(el.dataset.mi,10);
          const card = ms.cards[i];
          if(ms.solved.includes(card.id)) return;
          if(!ms.selected){ ms.selected = {i, card}; renderView(); return; }
          if(ms.selected.i===i){ ms.selected=null; renderView(); return; }
          if(ms.selected.card.id===card.id && ms.selected.card.side!==card.side){
            ms.solved.push(card.id);
            ms.selected = null;
            const w = state.words.find(x=>x.id===card.id);
            if(w) gradeWord(w, true);
            if(ms.solved.length===ms.pairs.length){
              s.finished=true;
              finishSession();
            } else {
              renderView();
            }
          } else {
            el.classList.add('wrong-flash');
            const prevI = ms.selected.i;
            ms.selected = null;
            setTimeout(()=>{ renderView(); }, 450);
          }
        };
      });
    }
  }

  /* ================= STATS ================= */
  function statsView(){
    const total = state.words.length;
    if(total === 0){
      return `<div class="empty-state"><div class="big-emoji">📊</div><p>Как только добавишь слова и потренируешься — здесь появится статистика.</p></div>`;
    }
    const learned = state.words.filter(w=>(w.box||0)>=5).length;
    const learning = state.words.filter(w=>{ const b=w.box||0; return b>=2 && b<5; }).length;
    const fresh = total - learned - learning;
    const due = dueWords(state.words).length;
    const pct = Math.round(100*learned/total);

    let attempts=0, correct=0;
    state.words.forEach(w=>{ attempts += (w.correct||0)+(w.wrong||0); correct += (w.correct||0); });
    const accuracy = attempts>0 ? Math.round(100*correct/attempts) : null;

    return `
      <div class="panel hero-panel">
        <div class="hero-ring" style="background:conic-gradient(var(--teal) ${pct}%, var(--bg-3) 0)">
          <div class="hero-ring-inner">
            <b>${pct}%</b>
            <span>выучено</span>
          </div>
        </div>
        <div class="hero-caption">Выучено <b>${learned}</b> слов из <b>${total}</b></div>
      </div>

      <div class="stat-grid">
        <div class="stat-box"><b>${due}</b><span>на повтор сегодня</span></div>
        <div class="stat-box"><b>${accuracy!==null ? accuracy+'%' : '—'}</b><span>точность ответов</span></div>
      </div>

      <div class="panel">
        <span class="eyebrow">Прогресс по словам</span>
        <div class="seg-bar">
          ${fresh>0?`<div class="seg seg-fresh" style="width:${fresh/total*100}%"></div>`:''}
          ${learning>0?`<div class="seg seg-learning" style="width:${learning/total*100}%"></div>`:''}
          ${learned>0?`<div class="seg seg-learned" style="width:${learned/total*100}%"></div>`:''}
        </div>
        <div class="seg-legend">
          <span><span class="dot" style="background:var(--ink-soft)"></span>Новые — ${fresh}</span>
          <span><span class="dot" style="background:var(--accent)"></span>Учу — ${learning}</span>
          <span><span class="dot" style="background:var(--teal)"></span>Выучено — ${learned}</span>
        </div>
        <div class="hint">Слово переходит из «Новые» в «Учу», а потом в «Выучено» по мере того, как ты правильно отвечаешь на тренировках. Ошибка возвращает его в начало.</div>
      </div>

      <div class="panel">
        <span class="eyebrow">По группам</span>
        ${state.groups.map(g=>{
          const gw = wordsIn(g.id);
          const n = gw.length;
          const m = gw.filter(w=>(w.box||0)>=5).length;
          const gpct = n>0 ? Math.round(100*m/n) : 0;
          return `<div class="group-stat-row">
            <div class="group-stat-top">
              <span class="gname">${g.emoji} ${esc(g.name)}</span>
              <span class="gnum">${m}/${n}</span>
            </div>
            <div class="group-stat-bar"><div class="group-stat-fill" style="width:${gpct}%"></div></div>
          </div>`;
        }).join('') || '<div class="hint">Пока нет групп.</div>'}
      </div>
    `;
  }

  /* ---------------- auth screen ---------------- */
  function loginHtml(){
    return `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-brand">Карто<span>тека</span></div>
        <p>Личный архив слов. Вход по почте — без пароля. Слова будут доступны с любого устройства.</p>
        <input type="text" id="auth-email" placeholder="твоя почта" autocomplete="email">
        <div style="margin-top:12px;"><button class="btn btn-accent btn-block" id="auth-send">Отправить ссылку для входа</button></div>
        <div id="auth-msg" class="auth-msg"></div>
      </div>
    </div>`;
  }
  function bindLogin(){
    const btn = document.getElementById('auth-send');
    if(!btn) return;
    const emailInput = document.getElementById('auth-email');
    const msg = document.getElementById('auth-msg');
    const send = async ()=>{
      const email = (emailInput.value||'').trim();
      if(!email || !email.includes('@')){ msg.textContent='Введи корректную почту'; msg.style.color='#F0A79F'; return; }
      btn.disabled = true; btn.textContent = 'Отправляю…';
      const redirectTo = window.location.href.split('#')[0].split('?')[0];
      const { error } = await supaClient.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTo } });
      btn.disabled = false; btn.textContent = 'Отправить ссылку для входа';
      if(error){ msg.textContent = 'Ошибка отправки: '+error.message; msg.style.color='#F0A79F'; }
      else { msg.textContent = 'Ссылка отправлена! Открой почту на этом устройстве и перейди по ссылке.'; msg.style.color='#9FE0CD'; }
    };
    btn.onclick = send;
    emailInput.onkeydown = (e)=>{ if(e.key==='Enter') send(); };
  }
  function showLogin(){
    root.innerHTML = loginHtml();
    bindLogin();
  }

  /* ---------------- init ---------------- */
  let bootedFor = null;
  async function boot(){
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);font-family:var(--mono);">загрузка картотеки…</div>`;
    await loadAll();
    render();
  }
  (function init(){
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);font-family:var(--mono);">подключение…</div>`;
    if(typeof supabase === 'undefined'){
      root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);">Не удалось загрузить модуль базы данных. Проверь интернет-соединение и обнови страницу.</div>`;
      return;
    }
    supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    supaClient.auth.onAuthStateChange((event, sess)=>{
      session = sess;
      if(session){
        if(bootedFor !== session.user.id){ bootedFor = session.user.id; boot(); }
      } else {
        bootedFor = null;
        showLogin();
      }
    });
  })();

})();
</script>
</body>
</html>
